      else if (bests.coins>=b.price){ status="Buy 🪙 "+b.price.toLocaleString(); col="#88ffaa"; }
      else                   { status="Need 🪙 "+b.price.toLocaleString(); col="#ff8888"; }
      drawShopRow(shopRowRect(i), b.color, null, b.name, stat, status, col, equipped, owned||(bests.coins>=b.price));
    }
  }

  ctx.fillStyle = "#888"; ctx.font = "11px Arial"; ctx.textAlign = "center";
  ctx.fillText("Press E or Esc to close", p.x+p.w/2, p.y+p.h-10);
  ctx.textAlign = "left";
}

function drawCombat(){
  // Apply sniper zoom-out: render world at 1/zoom scale so you see more
  const _z = getZoom();
  ctx.save();
  if (_z !== 1) ctx.scale(1/_z, 1/_z);
  drawWorldBg(dojo.width, dojo.height);
  // Physics zones drawn right on the ground, under everything
  drawPhysicsZones();

  // 🌿 bushes (under everything else, on the ground)
  bushes.forEach(b=>drawBush(b));

  // 🏚️ buildings (drawn before crates/chests so contents render on top)
  buildings.forEach(b=>drawBuilding(b));

  // ⚡ Falling airdrop crates with parachutes (rendered behind landed loot)
  airdrops.forEach(a=>drawAirdrop(a));

  // gun crates: wooden box with gun resting on top + label, prompt when near
  crates.forEach(c=>{
    const x = c.x - cam.x, y = c.y - cam.y;
    // wooden crate base
    ctx.fillStyle = "#8b5a2b";
    ctx.fillRect(x, y + c.size*0.45, c.size, c.size*0.55);
    ctx.strokeStyle = "#5e3a14";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x+0.5, y + c.size*0.45 + 0.5, c.size-1, c.size*0.55 - 1);
    // wood planks
    ctx.beginPath();
    ctx.moveTo(x + c.size/3, y + c.size*0.45);
    ctx.lineTo(x + c.size/3, y + c.size);
    ctx.moveTo(x + 2*c.size/3, y + c.size*0.45);
    ctx.lineTo(x + 2*c.size/3, y + c.size);
    ctx.stroke();
    // rarity glow halo behind crate
    const gs = GUN_STATS[c.gun];
    const rarKey = gs && gs.rarity;
    const rarCol = (rarKey && RARITY[rarKey]) ? RARITY[rarKey].color : "#bbb";
    ctx.fillStyle = rarCol + "33"; // ~20% alpha hex
    ctx.beginPath();
    ctx.arc(x + c.size/2, y + c.size/2, c.size*0.85, 0, Math.PI*2);
    ctx.fill();
    // recolor crate border to rarity
    ctx.strokeStyle = rarCol;
    ctx.lineWidth = 2;
    ctx.strokeRect(x+0.5, y + c.size*0.45 + 0.5, c.size-1, c.size*0.55 - 1);
    // gun icon on top
    drawGunIcon(c.gun, x + c.size/2, y + c.size*0.30, 18, 0);
    // label (rarity-colored) + small rarity tag
    ctx.fillStyle = rarCol;
    ctx.font = "bold 10px Arial";
    ctx.textAlign = "center";
    const lbl = (gs && gs.label) || c.gun;
    ctx.fillText(lbl, x + c.size/2, y + c.size + 11);
    ctx.fillStyle = rarCol;
    ctx.font = "bold 8px Arial";
    const rarTag = (rarKey ? RARITY[rarKey].label : "").toUpperCase()
                 + (c.airdrop ? " ⚡ AIRDROP" : "");
    ctx.fillText(rarTag, x + c.size/2, y + c.size + 21);
    // proximity prompt
    const px = player.x + player.size/2, py = player.y + player.size/2;
    const cx = c.x + c.size/2, cy = c.y + c.size/2;
    if (Math.hypot(px - cx, py - cy) < 60) {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x + c.size/2 - 28, y - 22, 56, 16);
      ctx.fillStyle = "#ffd24a";
      ctx.fillText("press E", x + c.size/2, y - 10);
    }
    ctx.textAlign = "start";
  });

  // gold chests
  goldChests.forEach(g=>{
    const x = g.x - cam.x, y = g.y - cam.y;
    const glow = 0.5 + 0.5*Math.sin(g.pulse);
    // glow
    ctx.fillStyle = "rgba(255,210,74," + (0.15 + 0.25*glow) + ")";
    ctx.beginPath();
    ctx.arc(x+g.size/2, y+g.size/2, g.size*0.9, 0, Math.PI*2);
    ctx.fill();
    // chest body
    ctx.fillStyle = "#ffd24a";
    ctx.fillRect(x, y+g.size*0.35, g.size, g.size*0.65);
    // lid
    ctx.fillStyle = "#f1b500";
    ctx.beginPath();
    ctx.moveTo(x, y+g.size*0.4);
    ctx.quadraticCurveTo(x+g.size/2, y - g.size*0.05, x+g.size, y+g.size*0.4);
    ctx.closePath();
    ctx.fill();
    // lock
    ctx.fillStyle = "#5e3a14";
    ctx.fillRect(x+g.size*0.42, y+g.size*0.45, g.size*0.16, g.size*0.18);
    // straps
    ctx.fillStyle = "#5e3a14";
    ctx.fillRect(x+g.size*0.05, y+g.size*0.4, g.size*0.06, g.size*0.6);
    ctx.fillRect(x+g.size*0.89, y+g.size*0.4, g.size*0.06, g.size*0.6);
  });

  // ammo
  ammoBoxes.forEach(a=>{
    const x = a.x - cam.x, y = a.y - cam.y;
    ctx.fillStyle = "#3ec1d5";
    ctx.fillRect(x, y, a.size, a.size);
    ctx.fillStyle = "#0e0f12";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    ctx.fillText("A", x + a.size/2, y + a.size*0.72);
    ctx.textAlign = "start";
  });

  // health packs (red cross box)
  healthPacks.forEach(h=>{
    const x = h.x - cam.x, y = h.y - cam.y;
    const glow = 0.5 + 0.5*Math.sin(h.pulse || 0);
    ctx.fillStyle = "rgba(124,252,0," + (0.10 + 0.20*glow) + ")";
    ctx.beginPath();
    ctx.arc(x+h.size/2, y+h.size/2, h.size*0.85, 0, Math.PI*2);
    ctx.fill();
    // box
    ctx.fillStyle = "#fff";
    ctx.fillRect(x, y, h.size, h.size);
    ctx.strokeStyle = "#aaa";
    ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, y+0.5, h.size-1, h.size-1);
    // red cross
    ctx.fillStyle = "#e23b3b";
    const t = h.size * 0.22;
    ctx.fillRect(x + h.size/2 - t/2, y + 3, t, h.size - 6);
    ctx.fillRect(x + 3, y + h.size/2 - t/2, h.size - 6, t);
  });

  // enemies (red ninjas, hold their own gun, with HP bar above)
  enemies.forEach(e=>{
    // 🟢🟠 DoT aura — glow when enemy is burning or poisoned
    if (e.dotEffects && e.dotEffects.length > 0){
      const hasFire  = e.dotEffects.some(d=>d.interval===30);
      const hasToxic = e.dotEffects.some(d=>d.interval===38);
      const auraColor = hasFire ? "rgba(255,110,20,0.45)" : "rgba(100,255,30,0.42)";
      const auraR = e.size * 0.75 + 4 * Math.sin(Date.now() / 120);
      const ex = e.x - cam.x + e.size/2, ey = e.y - cam.y + e.size/2;
      ctx.save();
      ctx.globalAlpha = 0.7;
      const grad = ctx.createRadialGradient(ex, ey, 0, ex, ey, auraR);
      grad.addColorStop(0, auraColor);
      grad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ex, ey, auraR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    drawNinja(e.x, e.y, e.size, "#c0392b", e.aim || 0,
              { belt:"#7a1d12", gunKind: e.gun || "pistol" });
    // HP bar
    const sx = e.x - cam.x, sy = e.y - cam.y;
    const bw = 36, bh = 4;
    const bx = sx + e.size/2 - bw/2;
    const by = sy - 12;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(bx-1, by-1, bw+2, bh+2);
    ctx.fillStyle = "#3a0d0d";
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = "#ff6b6b";
    ctx.fillRect(bx, by, bw * Math.max(0, e.hp / e.maxHp), bh);
    // gun label + level marker
    ctx.fillStyle = "#fff";
    ctx.font = "bold 9px Arial";
    ctx.textAlign = "center";
    const label = (GUN_STATS[e.gun] && GUN_STATS[e.gun].label) || "Pistol";
    ctx.fillText("Lv " + level + " — " + label, sx + e.size/2, by - 3);
    ctx.textAlign = "start";
  });

  // bullets (per-kind rendering)
  bullets.forEach(b=>{
    drawBullet(b);
  });
  // bot bullets
  enemyBullets.forEach(b=>{
    drawBullet(b);
  });

  // explosions
  explosions.forEach(ex=>{
    const a = Math.max(0, ex.life / ex.max);
    const r = ex.r * (1 - a*0.4);
    ctx.fillStyle = "rgba(255,140,40," + (0.55*a) + ")";
    ctx.beginPath();
    ctx.arc(ex.x - cam.x, ex.y - cam.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,230,160," + (0.6*a) + ")";
    ctx.beginPath();
    ctx.arc(ex.x - cam.x, ex.y - cam.y, r*0.6, 0, Math.PI*2);
    ctx.fill();
  });

  // player ninja (flicker on i-frames) — gun follows active slot
  if (!(player.inv > 0 && (player.inv % 8 < 4))) {
    const ag = activeEntry();
    const ar = currentArmor();
    const hl = currentHelmet();
    drawNinja(player.x, player.y, player.size, "#3a6dd9", player.aim,
              { belt:"#1f3d80", gunKind: ag ? ag.gun : null,
                armorColor: ar.color, armorTrim: ar.trim,
                helmetColor: hl.color, helmetTrim: hl.trim });
  }

  // floating pickup text
  pickups.forEach(p=>{
    ctx.fillStyle = p.color;
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(p.text, p.x - cam.x + 15, p.y - cam.y);
  });
  ctx.textAlign = "start";

  // End of zoomed world rendering — restore for HUD
  ctx.restore();

  // 🌍 ZONE INDICATOR — bottom-left badge when player is standing in a zone
  if (scene === "playing"){
    const zone = getPlayerZone();
    if (zone){
      const st = ZONE_STYLE[zone.type];
      const vw = VIEW_W(), vh = VIEW_H();
      const pillW = 130, pillH = 26, pillX = 10, pillY = vh - 72;
      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.beginPath(); ctx.roundRect(pillX, pillY, pillW, pillH, 7); ctx.fill();
      ctx.font = "bold 13px Arial";
      ctx.fillStyle = st.labelCol;
      ctx.textAlign = "center";
      // zone-specific effect description
      const desc = {
        water:"WATER · slow ×0.5",
        ice:"ICE · slide!",
        fire:"FIRE · losing HP!",
        forest:"FOREST · slow ×0.65",
        nuclear:"NUCLEAR · losing HP!"
      }[zone.type] || zone.type;
      ctx.fillText(st.label + "  " + (desc.split("·")[1]||"").trim(), pillX+pillW/2, pillY+18);
      ctx.textAlign = "start";
      // flashing red border on damage zones
      if (zone.type === "fire" || zone.type === "nuclear"){
        const flash = Math.sin(Date.now()/150) > 0;
        if (flash){
          ctx.strokeStyle = zone.type === "fire" ? "#ff4400" : "#44ff22";
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.roundRect(pillX, pillY, pillW, pillH, 7); ctx.stroke();
        }
        // screen edge vignette tint
        const vcol = zone.type === "fire" ? "rgba(255,40,0,0.12)" : "rgba(80,255,40,0.10)";
        ctx.fillStyle = vcol;
        ctx.fillRect(0, 0, vw, vh);
      }
    }
  }

  // ⏱️ LEVEL TIMER HUD — top-center countdown clock
  if (scene === "playing" && levelTimer >= 0){
    const totalSec = Math.ceil(levelTimer / 60);
    const mins = Math.floor(totalSec / 60);
    const secs = totalSec % 60;
    const timeStr = mins + ":" + String(secs).padStart(2,"0");
    const vw = VIEW_W();
    const danger = levelTimer <= 20 * 60;   // last 20 seconds
    const urgent = levelTimer <= 10 * 60;   // last 10 seconds
    // Pulsing red flash in last 10 seconds
    const flash = urgent ? (Math.sin(Date.now() / 120) > 0) : false;
    // Background pill
    const pillW = 90, pillH = 32, pillX = vw/2 - pillW/2, pillY = 8;
    ctx.fillStyle = urgent
      ? (flash ? "rgba(200,0,0,0.85)" : "rgba(120,0,0,0.85)")
      : danger
        ? "rgba(180,60,0,0.75)"
        : "rgba(0,0,0,0.55)";
    ctx.beginPath();
    ctx.roundRect(pillX, pillY, pillW, pillH, 8);
    ctx.fill();
    // Clock icon
    ctx.font = "14px Arial";
    ctx.fillStyle = danger ? "#ff8844" : "#ccc";
    ctx.textAlign = "center";
    ctx.fillText("⏱", vw/2 - 22, pillY + 21);
    // Time text
    ctx.font = "bold 16px monospace";
    ctx.fillStyle = urgent ? (flash ? "#fff" : "#ff4444") : danger ? "#ffaa44" : "#ffffff";
    ctx.fillText(timeStr, vw/2 + 12, pillY + 22);
    ctx.textAlign = "start";
    // "HURRY!" warning banner in last 20 seconds
    if (danger && !urgent){
      ctx.font = "bold 13px Arial";
      ctx.fillStyle = "rgba(255,140,0,0.9)";
      ctx.textAlign = "center";
      ctx.fillText("⚠ HURRY!", vw/2, pillY + 52);
      ctx.textAlign = "start";
    }
    if (urgent){
      ctx.font = "bold 15px Arial";
      ctx.fillStyle = flash ? "#ff2222" : "#ff8844";
      ctx.textAlign = "center";
      ctx.fillText("💣 BOMB INCOMING!", vw/2, pillY + 52);
      ctx.textAlign = "start";
    }
  }

  // mini upgrade strip + inventory bar
  drawUpgradeStrip();
  drawInventoryBar();

  // GAME OVER overlay
  if(scene === "gameover"){
    const vw = VIEW_W(), vh = VIEW_H();
    const cx = vw/2, cy = vh/2;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0,0,vw,vh);
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "44px Arial";
    ctx.fillText("YOU FELL", cx, cy - 35);
    ctx.font = "18px Arial";
    ctx.fillText("Level reached: " + level + "   Score: " + score, cx, cy + 5);
    ctx.fillStyle = "#ffd24a";
    ctx.fillText("Best Level: " + bests.bestLevel + "   High Score: " + bests.bestScore, cx, cy + 31);
    if (savedNewRecord) {
      ctx.fillStyle = "#7CFC00";
      ctx.font = "20px Arial";
      ctx.fillText("New Record!", cx, cy + 65);
    }
    ctx.fillStyle = "#bbb";
    ctx.font = "13px Arial";
    ctx.fillText("Returning to lobby...", cx, cy + 95);
    ctx.textAlign = "start";
  }
}

function drawUpgradeStrip(){
  const g = activeGun() || GUN_STATS.pistol;
  const gunName = activeEntry() ? activeEntry().gun : "pistol";
  const dmgShown = gunName === "sniper" ? "1HK" : (g.dmg + player.damageBonus);
  const items = [
    ["DMG",  dmgShown],
    ["RATE", "+" + player.fireRateLevel],
    ["SPD",  "+" + player.bulletSpeedBonus],
    ["MULT", 1 + player.multishot],
    ["HP",   player.maxHp]
  ];
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(8, 8, 195, 22);
  ctx.font = "12px Arial";
  ctx.fillStyle = "#ffd24a";
  let x = 14;
  items.forEach(([k,v])=>{
    ctx.fillText(k + ":" + v, x, 24);
    x += 38;
  });

  // 🪙 Coin counter (below stats strip)
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(8, 32, 120, 20);
  ctx.fillStyle = "#ffd24a";
  ctx.font = "bold 12px Arial";
  ctx.fillText("🪙 " + bests.coins.toLocaleString(), 14, 47);

  // HP bar (top right of canvas)
  const barW = 160, barH = 12;
  const bx = VIEW_W() - barW - 12, by = 12;
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(bx-2, by-2, barW+4, barH+4);
  ctx.fillStyle = "#3a3a3a";
  ctx.fillRect(bx, by, barW, barH);
  const pct = Math.max(0, player.hp) / player.maxHp;
  ctx.fillStyle = pct > 0.5 ? "#7CFC00" : (pct > 0.25 ? "#ffb84a" : "#e23b3b");
  ctx.fillRect(bx, by, barW * pct, barH);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 11px Arial";
  ctx.textAlign = "center";
  ctx.fillText(Math.max(0, player.hp) + " / " + player.maxHp + "  HP", bx + barW/2, by + 10);
  ctx.textAlign = "start";
}

// 📊 HUD
const hud = {
  lvl: document.getElementById("lvl"),
  score: document.getElementById("score"),
  hp: document.getElementById("hp"),
  ammo: document.getElementById("ammo"),
  gun: document.getElementById("gun"),
  armor: document.getElementById("armor"),
  bestLvl: document.getElementById("bestLvl"),
  bestScore: document.getElementById("bestScore")
};
function updateHud(){
  hud.lvl.textContent = scene === "lobby" ? "lobby" : level;
  hud.score.textContent = score;
  hud.hp.textContent = Math.max(0, player.hp) + " / " + player.maxHp;
  const e = activeEntry();
  if (e) {
    const g = GUN_STATS[e.gun];
    hud.ammo.textContent = e.ammo + " / " + (g.maxAmmo || "∞");
    hud.gun.textContent = g.label || e.gun;
  } else {
    hud.ammo.textContent = "—";
    hud.gun.textContent = "(empty)";
  }
  const armor = currentArmor();
  hud.armor.textContent = armor.tier === 0
    ? "None"
    : armor.name + " (" + Math.round(armor.dr * 100) + "% DR)";
  hud.bestLvl.textContent = bests.bestLevel;
  hud.bestScore.textContent = bests.bestScore;
}

// LOOP
function loop(){
  update();
  draw();
  updateHud();
  requestAnimationFrame(loop);
}

// START
enterLobby();
loop();
</script>

</body>
</html>
