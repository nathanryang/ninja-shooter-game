function applyDamage(raw){
  const a = currentArmor();
  const h = currentHelmet();
  const totalDR = Math.min(0.88, a.dr + h.dr);  // combined DR, capped at 88%
  const reduced = Math.max(0, Math.round(raw * (1 - totalDR)));
  const dmg = (raw > 0 && reduced === 0) ? 1 : reduced;
  player.hp -= dmg;
  return dmg;
}

function levelStats(lv){
  const t = Math.min(1, Math.max(0, (lv - 1) / 99));
  return {
    hp:           Math.round(30 + t * 3970),  // 30 → 4000
    speed:        0.16 + t * 1.04,            // 0.16 → 1.2 (matches player base speed)
    cooldownMult: 2.5 - t * 2.2,              // 2.5x → 0.3x base gun cooldown

    maxTier:      Math.max(1, Math.min(6, 1 + Math.floor((lv - 1) / 12))) // gun tier cap

}

const GUN_NAMES = Object.keys(GUN_STATS);
const MAX_INVENTORY = 5;

// Bot gun pool — bot draws weapons up to a tier cap derived from current level.
// Mapping from rarity → tier (1 easy → 5 endgame).
const RARITY_TIER = { common:1, uncommon:2, rare:3, legendary:4, mythic:5 };
const GUN_TIERS = {};
GUN_NAMES.forEach(n => { GUN_TIERS[n] = RARITY_TIER[GUN_STATS[n].rarity] || 1; });

function chooseBotGun(maxTier){
  // map old 1-6 maxTier curve onto new 1-5 rarity tiers
  const cap = Math.max(1, Math.min(5, Math.ceil(maxTier * 5 / 6)));
  const pool = GUN_NAMES.filter(g => GUN_TIERS[g] <= cap);
  return pool[Math.floor(Math.random() * pool.length)];
}

// 🎲 Weighted random gun pick by rarity (used when crates spawn loot)
// Skips airdropOnly guns (those only fall from the sky in airdrops).
function randomGunByRarity(){
  const pool = GUN_NAMES.filter(n => !GUN_STATS[n].airdropOnly);
  const totalW = pool.reduce((a,n)=> a + (RARITY[GUN_STATS[n].rarity].weight), 0);
  let roll = Math.random() * totalW;
  for (const n of pool) {
    roll -= RARITY[GUN_STATS[n].rarity].weight;
    if (roll <= 0) return n;
  }
  return "pistol";
}

// ⚡ Pick a god-tier gun for an airdrop (mythic-only, with the airdropOnly weapons heavily favored)
function chooseAirdropGun(){
  const godPool = GUN_NAMES.filter(n => GUN_STATS[n].airdropOnly);
  const mythPool = GUN_NAMES.filter(n => GUN_STATS[n].rarity === "mythic" && !GUN_STATS[n].airdropOnly);
  // 70% chance: pick a god weapon (Master Bolt or Trident).
  // 30% chance: pick a regular mythic for variety (RPG, BFG, etc.).
  if (godPool.length && Math.random() < 0.70) {
    return godPool[Math.floor(Math.random() * godPool.length)];
  }
  if (mythPool.length) return mythPool[Math.floor(Math.random() * mythPool.length)];
  return "rocket";
}

  };
}

function activeEntry(){
  return player.inventory[player.activeSlot] || null;

// Returns the physics zone the player centre is standing in (or null)
function getPlayerZone(){
  const cx = player.x + player.size/2, cy = player.y + player.size/2;
  for (const z of physicsZones){
    if (cx > z.x && cx < z.x+z.w && cy > z.y && cy < z.y+z.h) return z;
  }
  return null;
}
function getZoom(){
  const g = activeGun();
  return (g && g.zoom) ? g.zoom : 1.0;
}
function updateWorldMouse(){
  const z = getZoom();
  mouse.x = mouseScreen.x * z + cam.x;
  mouse.y = mouseScreen.y * z + cam.y;
}
function activeGun(){
  const e = activeEntry();
  return e ? GUN_STATS[e.gun] : null;
}
function selectSlot(i){
  if (i >= 0 && i < player.inventory.length) {
    player.activeSlot = i;
  }
}
function tryAddGun(name){
  if (!GUN_STATS[name]) return false;
  if (player.inventory.length >= MAX_INVENTORY) return false;
  player.inventory.push({ gun:name, ammo: GUN_STATS[name].maxAmmo });
  player.activeSlot = player.inventory.length - 1;
  return true;
}
function dropSlot(i){
  if (i < 0 || i >= player.inventory.length) return;
  player.inventory.splice(i, 1);
  if (player.inventory.length === 0) {
    // always keep at least the pistol so the player can fight
    player.inventory.push({ gun:"pistol", ammo: GUN_STATS.pistol.maxAmmo });
  }
  player.activeSlot = Math.max(0, Math.min(player.activeSlot, player.inventory.length - 1));
}

const BUILDING_THEME_KEYS = Object.keys(BUILDING_THEMES);
function randomTheme(){ return BUILDING_THEME_KEYS[Math.floor(Math.random()*BUILDING_THEME_KEYS.length)]; }
const DOOR_SIDES = ["south","north","east","west"];
function randomDoorSide(){ return DOOR_SIDES[Math.floor(Math.random()*DOOR_SIDES.length)]; }

// 🏚️ BUILDING (themed apartment with a door + loot inside)
function spawnBuilding(x, y, w, h, opts){
  opts = opts || {};
  const themeKey = opts.theme || randomTheme();
  const theme = BUILDING_THEMES[themeKey];
  const doorSide = opts.doorSide || randomDoorSide();
  const t = 8;                      // wall thickness
  const doorW = 40;

  // Build walls + door rect according to which side the door is on.
  let door, ws;
  if (doorSide === "south") {
    const dx = x + w/2 - doorW/2;
    door = { x: dx, y: y+h-t, w: doorW, h: t, side:"south" };
    ws = [
      { x, y, w, h: t },                                            // top
      { x, y: y+h-t, w: dx - x, h: t },                             // bottom-left
      { x: dx+doorW, y: y+h-t, w: (x+w) - (dx+doorW), h: t },       // bottom-right
      { x, y, w: t, h },                                            // left
      { x: x+w-t, y, w: t, h }                                      // right
    ];
  } else if (doorSide === "north") {
    const dx = x + w/2 - doorW/2;
    door = { x: dx, y, w: doorW, h: t, side:"north" };
    ws = [
      { x, y, w: dx - x, h: t },                                    // top-left
      { x: dx+doorW, y, w: (x+w) - (dx+doorW), h: t },              // top-right
      { x, y: y+h-t, w, h: t },                                     // bottom
      { x, y, w: t, h },                                            // left
      { x: x+w-t, y, w: t, h }                                      // right
    ];
  } else if (doorSide === "east") {
    const dy = y + h/2 - doorW/2;
    door = { x: x+w-t, y: dy, w: t, h: doorW, side:"east" };
    ws = [
      { x, y, w, h: t },                                            // top
      { x, y: y+h-t, w, h: t },                                     // bottom
      { x, y, w: t, h },                                            // left
      { x: x+w-t, y, w: t, h: dy - y },                             // right-top
      { x: x+w-t, y: dy+doorW, w: t, h: (y+h) - (dy+doorW) }        // right-bottom
    ];
  } else { // west
    const dy = y + h/2 - doorW/2;
    door = { x, y: dy, w: t, h: doorW, side:"west" };
    ws = [
      { x, y, w, h: t },                                            // top
      { x, y: y+h-t, w, h: t },                                     // bottom
      { x: x+w-t, y, w: t, h },                                     // right
      { x, y, w: t, h: dy - y },                                    // left-top
      { x, y: dy+doorW, w: t, h: (y+h) - (dy+doorW) }               // left-bottom
    ];
  }

  // Ruins theme: knock out one random wall segment for that derelict look.
  if (theme.broken && ws.length > 2) {
    ws.splice(Math.floor(Math.random() * ws.length), 1);
  }

  const b = { x, y, w, h, doorW, walls: ws, door, theme: themeKey };
  buildings.push(b);
  walls.push(...b.walls);

  // loot inside — varies by theme
  const cx = x + w/2, cy = y + h/2;
  const numCrates = theme.crates;
  const numGold = theme.gold;
  const numHP = theme.healthPack;

  // gold chests, spaced along the top inner row
  for (let i = 0; i < numGold; i++) {
    const offset = (i - (numGold - 1) / 2) * 40;
    goldChests.push({
      x: cx + offset - 16, y: cy - 36,
      size: 32, pulse: Math.random() * Math.PI * 2
    });
  }

  // crates arranged in a circle around the center
  for (let i = 0; i < numCrates; i++) {
    const ang = (i / numCrates) * Math.PI * 2 + Math.PI / 4;
    const r = Math.max(20, Math.min(w, h) / 3.5);
    crates.push({
      x: cx + Math.cos(ang) * r - 16,
      y: cy + Math.sin(ang) * r + 4,
      size: 32,
      gun: randomGunByRarity()
    });
  }

  // teahouse health pack
  for (let i = 0; i < numHP; i++) {
    healthPacks.push({
      x: cx + 24, y: cy + 18,
      size: 22, pulse: Math.random() * Math.PI * 2
    });
  }

  return b;
}

function rectsOverlap(a, b, pad){
  pad = pad || 0;
  return a.x - pad < b.x + b.w &&
         a.x + a.w + pad > b.x &&
         a.y - pad < b.y + b.h &&
         a.y + a.h + pad > b.y;
}
function pointInAnyBuilding(x, y, pad){
  pad = pad || 0;
  for (const b of buildings) {
    if (x > b.x - pad && x < b.x + b.w + pad &&
        y > b.y - pad && y < b.y + b.h + pad) return true;
  }
  return false;
}

// 🔄 SPAWN COMBAT LEVEL
function spawnLevel(){
  enemies = [];
  crates = [];
  goldChests = [];
  ammoBoxes = [];
  healthPacks = [];
  pickups = [];
  buildings = [];
  walls = [];
  bushes = [];
  airdrops = [];
  physicsZones = [];

  // 🌍 PHYSICS ZONES — place 1-2 of each type, avoiding player spawn + buildings
  const ZONE_TYPES = ["water","ice","fire","forest","nuclear"];
  const playerSafeZone = { x:200, y:200, w:200, h:200 };
  for (const type of ZONE_TYPES){
    const count = 1 + (Math.random() < 0.55 ? 1 : 0);
    for (let zi=0; zi<count; zi++){
      let zx, zy, zw, zh, tries=0;
      do {
        zw = 180 + Math.random()*180;
        zh = 160 + Math.random()*160;
        zx = 80 + Math.random()*(dojo.width  - zw - 80);
        zy = 80 + Math.random()*(dojo.height - zh - 80);
        tries++;
      } while (tries < 30 && (
        rectsOverlap({x:zx,y:zy,w:zw,h:zh}, playerSafeZone, 20) ||
        buildings.some(b=>rectsOverlap({x:zx,y:zy,w:zw,h:zh}, b, 10))
      ));
      if (tries < 30) physicsZones.push({ x:zx, y:zy, w:zw, h:zh, type, tick:0 });
    }
  }

  // 🏚️ Place 12 apartments (no overlap, not on player spawn) — try harder
  const playerSafe = { x: 280, y: 280, w: 120, h: 120 };
  let attempts = 0;
  while (buildings.length < 12 && attempts < 800){
    attempts++;
    const w = 160 + Math.floor(Math.random()*80);   // 160–240
    const h = 140 + Math.floor(Math.random()*70);   // 140–210
    const cand = {
      x: 200 + Math.random() * (dojo.width  - w - 260),
      y: 200 + Math.random() * (dojo.height - h - 260),
      w, h
    };
    let ok = !rectsOverlap(cand, playerSafe, 60);
    if (ok) {
      for (const b of buildings){
        if (rectsOverlap(cand, b, 60)) { ok = false; break; }
      }
    }
    if (ok) spawnBuilding(cand.x, cand.y, w, h);
  }

  // 🌿 Bushes scattered around (not inside walls)
  for (let i=0;i<28;i++){
    const bx = 80 + Math.random()*(dojo.width - 160);
    const by = 80 + Math.random()*(dojo.height - 160);
    if (pointInAnyBuilding(bx, by, 12)) continue;
    bushes.push({ x: bx, y: by, r: 14 + Math.random()*12, hp: 5, maxHp: 5 });
  }

  // 👤 ONE rival bot (1v1 duel), scaled to current level
  enemyBullets = [];
  const s = levelStats(level);
  let bx, by, tries = 0;
  do {
    bx = 800 + Math.random()*500;
    by = 600 + Math.random()*500;
    tries++;
  } while (pointInAnyBuilding(bx, by, 28) && tries < 30);
  const botGun = chooseBotGun(s.maxTier);
  enemies.push({
    x: bx, y: by, size: 24,
    speed: s.speed,
    hp: s.hp, maxHp: s.hp,
    aim: 0,
    gun: botGun,
    cooldown: 90,                 // give the player a moment before first shot
    cooldownMult: s.cooldownMult,
    dmgMult: s.dmgMult,
    spread: s.spread,
    strafeDir: Math.random() < 0.5 ? -1 : 1,
    strafeTimer: 60 + Math.random()*90,
    dotEffects: []
  });

  // 📦 A couple of outdoor gun crates (in addition to those inside buildings)
  const numOutdoorCrates = 1 + (Math.random() < 0.5 ? 1 : 0);
  for (let i=0;i<numOutdoorCrates;i++){
    let cx, cy, tries=0;
    do {
      cx = 300 + Math.random()*1000;
      cy = 300 + Math.random()*800;
      tries++;
    } while (pointInAnyBuilding(cx, cy, 24) && tries < 10);
    crates.push({
      x:cx, y:cy, size:32,
      gun: randomGunByRarity()
    });
  }

  // 🥫 Ammo boxes outside buildings
  for (let i=0;i<3;i++){
    let ax, ay, tries=0;
    do {
      ax = 300 + Math.random()*1000;
      ay = 300 + Math.random()*800;
      tries++;
    } while (pointInAnyBuilding(ax, ay, 16) && tries < 10);
    ammoBoxes.push({ x:ax, y:ay, size:20 });
  }

  // ❤️ Health packs
  if (Math.random() < 0.5) {
    let hx, hy, tries=0;
    do {
      hx = 300 + Math.random()*1000;
      hy = 300 + Math.random()*800;
      tries++;
    } while (pointInAnyBuilding(hx, hy, 18) && tries < 10);
    healthPacks.push({ x:hx, y:hy, size:22, pulse: Math.random()*Math.PI*2 });
  }
  if (player && player.hp < player.maxHp * 0.5 && Math.random() < 0.7) {
    let hx, hy, tries=0;
    do {
      hx = 300 + Math.random()*1000;
      hy = 300 + Math.random()*800;
      tries++;
    } while (pointInAnyBuilding(hx, hy, 18) && tries < 10);
    healthPacks.push({ x:hx, y:hy, size:22, pulse: Math.random()*Math.PI*2 });
  }

  // ⚡ AIRDROP — falls from the sky carrying a god-tier mythic gun.
  // Only one drops every 5 levels (5, 10, 15, ...).
  if (level % 5 === 0) spawnAirdrop();
  levelTimer = 90 * 60;  // 1:30 per level
}

// 🖱️ MOUSE HANDLERS (split by region: inventory bar vs world)
function onMouseDown(e){
  // shop overlay intercepts clicks while open
  if (shopOpen) {
    handleShopClick(mouseScreen.x, mouseScreen.y);
    return;
  }
  // ignore clicks if we're on the inventory strip
  const slotIdx = slotAtScreen(mouseScreen.x, mouseScreen.y);
  if (slotIdx >= 0) {
    if (slotIdx < player.inventory.length) {
      // start a drag (which also acts as a "select" if released in place)
      dragSlot = slotIdx;
      dragOrigin.x = mouseScreen.x;
      dragOrigin.y = mouseScreen.y;
    }
    return; // never fire when interacting with the bar
  }
  shoot();
}

// 🛍️ Shop UI — list rows down the panel; click a row to equip if unlocked.
function shopPanelRect(){
  const W = 500, H = 440;
  return { x: (canvas.width - W) / 2, y: (canvas.height - H) / 2, w: W, h: H };
}
function shopRowRect(i){
  const p = shopPanelRect();
  const rowH = 28;
  return { x: p.x + 16, y: p.y + 90 + i * rowH, w: p.w - 32, h: rowH - 4 };
}
function shopTabRect(idx){
  const p = shopPanelRect();
  const tabs = ["armor","helmet","boots"];
  const tw = (p.w - 32) / tabs.length;
  return { x: p.x + 16 + idx * tw, y: p.y + 46, w: tw - 4, h: 26 };
}
function handleShopClick(mx, my){
  const p = shopPanelRect();
  // close button
  if (mx >= p.x + p.w - 30 && mx <= p.x + p.w - 6 &&
      my >= p.y + 6        && my <= p.y + 30) {
    shopOpen = false; return;
  }
  // tab clicks
  const tabs = ["armor","helmet","boots"];
  for (let ti = 0; ti < tabs.length; ti++){
    const tr = shopTabRect(ti);
    if (mx >= tr.x && mx <= tr.x+tr.w && my >= tr.y && my <= tr.y+tr.h){
      shopTab = tabs[ti]; return;
    }
  }
  // row clicks
  if (shopTab === "armor"){
    for (let i = 0; i < ARMOR_SETS.length; i++) {
      const r = shopRowRect(i);
      if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
        if (bests.bestLevel >= ARMOR_SETS[i].unlock) { bests.armorTier = i; saveBests(); }
        return;
      }
    }
  } else if (shopTab === "helmet"){
    for (let i = 0; i < HELMET_SHOP.length; i++){
      const r = shopRowRect(i);
      if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h){
        const item = HELMET_SHOP[i];
        if (i === 0) { bests.helmetTier = 0; saveBests(); }
        else if (bests.helmetTier >= i) { bests.helmetTier = i; saveBests(); } // re-equip lower tier
        else if (bests.coins >= item.price){
          bests.coins -= item.price;
          bests.helmetTier = i;
          saveBests();
          pushPickup(player ? player.x : 400, player ? player.y : 300, "Bought " + item.name + "!", "#ffd24a");
        }
        return;
      }
    }
  } else if (shopTab === "boots"){
    for (let i = 0; i < BOOTS_SHOP.length; i++){
      const r = shopRowRect(i);
      if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h){
        const item = BOOTS_SHOP[i];
        if (i === 0) { bests.bootsTier = 0; saveBests(); }
        else if (bests.bootsTier >= i) { bests.bootsTier = i; saveBests(); }
        else if (bests.coins >= item.price){
          bests.coins -= item.price;
          bests.bootsTier = i;
          saveBests();
          if (player) player.speed = 1.2 + currentBoots().bonus;
          pushPickup(player ? player.x : 400, player ? player.y : 300, "Bought " + item.name + "!", "#ffd24a");
        }
        return;
      }
    }
  }
}
function onMouseUp(e){
  if (dragSlot !== null) {
    const overSlot = slotAtScreen(mouseScreen.x, mouseScreen.y);
    const movedFar =
      Math.hypot(mouseScreen.x - dragOrigin.x, mouseScreen.y - dragOrigin.y) > 28;
    if (overSlot < 0 && movedFar) {
      // dropped outside the bar — discard this gun
      const removed = player.inventory[dragSlot];
      if (removed) {
        pushPickup(player.x, player.y - 18, "Dropped " + (GUN_STATS[removed.gun].label), "#bbb");
      }
      dropSlot(dragSlot);
    } else {
      // simple click on a slot — select it
      selectSlot(dragSlot);
    }
    dragSlot = null;
  }
}

// 🤝 PICKUP (E key)
function tryPickupNearby(){
  if (scene !== "playing") return;
  // find nearest crate within reach
  let best = null, bestDist = 60;
  for (const c of crates) {
    const cx = c.x + c.size/2, cy = c.y + c.size/2;
    const px = player.x + player.size/2, py = player.y + player.size/2;
    const d = Math.hypot(px - cx, py - cy);
    if (d < bestDist) { best = c; bestDist = d; }
  }
  if (!best) return;
  if (player.inventory.length >= MAX_INVENTORY) {
    pushPickup(best.x, best.y, "Inventory full!", "#ff6b6b");
    return;
  }
  if (tryAddGun(best.gun)) {
    pushPickup(best.x, best.y, "Picked up " + GUN_STATS[best.gun].label, "#fff");
    score += 25;
    best.dead = true;
  }
}

// 🔫 SHOOT (uses active inventory slot)
function shoot(){
  if (scene !== "playing") return;
  const entry = activeEntry();
  if (!entry) return;
  if (entry.ammo <= 0) return;
  if (player.cooldown > 0) return;

  const g = GUN_STATS[entry.gun];

  player.cooldown = Math.max(2, g.cooldown - player.fireRateLevel);
  entry.ammo--;

  const dx = mouse.x - (player.x + player.size/2);
  const dy = mouse.y - (player.y + player.size/2);
  const baseAng = Math.atan2(dy, dx);

  const speed = g.speed + player.bulletSpeedBonus;
  const dmg = g.dmg + player.damageBonus;
  const life = Math.ceil(g.range / speed);

  // shotgun/flak fire fixed pellets; otherwise multishot upgrade adds extras
  const fan = (g.bullets > 1) ? g.bullets : (1 + player.multishot);
  const spreadBase = g.spread || ((g.bullets > 1) ? 0.18 : 0);

  for (let i=0;i<fan;i++){
    const offset = fan === 1
      ? 0
      : (i - (fan-1)/2) * spreadBase + (Math.random()-0.5) * (g.spread*0.4);
    const ang = baseAng + offset;
    bullets.push({
      x: player.x + player.size/2,
      y: player.y + player.size/2,
      startX: player.x + player.size/2,
      startY: player.y + player.size/2,
      dx: Math.cos(ang) * speed,
      dy: Math.sin(ang) * speed,
      ang: ang,
      size: (g.kind === "rocket") ? 7 : (g.kind === "bolt" ? 4 : (g.kind === "tracer" ? 3 : (g.kind === "pellet" ? 4 : 5))),
      dmg: dmg,
      life: life,
      pierce: g.pierce ? g.pierce : 0,
      hits: 0,
      color: g.color,
      kind: g.kind,
      aoe: g.aoe || 0,
      aoeDmg: g.aoeDmg || 0,
      dot: g.dot || null,
      minRange: g.minRange || 0
    });
  }
}

// 🎯 COLLISION (AABB)
function hit(a,b){
  return a.x < b.x+b.size &&
         a.x+a.size > b.x &&
         a.y < b.y+b.size &&
         a.y+a.size > b.y;
}

// 🚶 MOVE
function move(){
  // freeze player while browsing the shop
  if (shopOpen) {
    player.aim = Math.atan2(mouse.y - (player.y+player.size/2),
                            mouse.x - (player.x+player.size/2));
    return;
  }

  const zone = (scene === "playing") ? getPlayerZone() : null;
  const ztype = zone ? zone.type : null;

  // Speed modifier from terrain
  let spd = player.speed;
  if (ztype === "water")   spd *= 0.48;
  if (ztype === "forest")  spd *= 0.65;
  if (ztype === "nuclear") spd *= 0.78;
  // fire: no speed change — just damage
  // ice: velocity-based (handled below)

  if (ztype === "ice"){
    // Accumulate velocity, very slow friction → slide
    const accel = 0.14;
    const friction = 0.97;
    if(keys["w"] || keys["arrowup"])    player.vy -= accel;
    if(keys["s"] || keys["arrowdown"])  player.vy += accel;
    if(keys["a"] || keys["arrowleft"])  player.vx -= accel;
    if(keys["d"] || keys["arrowright"]) player.vx += accel;
    // clamp to base speed
    const maxV = player.speed * 1.6;
    player.vx = Math.max(-maxV, Math.min(maxV, player.vx)) * friction;
    player.vy = Math.max(-maxV, Math.min(maxV, player.vy)) * friction;
    player.x += player.vx;
    player.y += player.vy;
  } else {
    // Normal (or slowed) direct movement
    if(keys["w"] || keys["arrowup"])    player.y -= spd;
    if(keys["s"] || keys["arrowdown"])  player.y += spd;
    if(keys["a"] || keys["arrowleft"])  player.x -= spd;
    if(keys["d"] || keys["arrowright"]) player.x += spd;
    // Bleed off ice velocity when not on ice
    player.vx *= 0.7; player.vy *= 0.7;
  }

  const w = world();
  player.x = Math.max(0, Math.min(w.width  - player.size, player.x));
  player.y = Math.max(0, Math.min(w.height - player.size, player.y));
  resolveWallCollisions(player);
  player.aim = Math.atan2(mouse.y - (player.y+player.size/2),
                          mouse.x - (player.x+player.size/2));
}

// 🧱 push an entity (with x, y, size) out of any wall it overlaps
function resolveWallCollisions(ent){
  for (const w of walls) {
    if (ent.x < w.x + w.w &&
        ent.x + ent.size > w.x &&
        ent.y < w.y + w.h &&
        ent.y + ent.size > w.y) {
      const overlapX = Math.min(ent.x + ent.size - w.x, w.x + w.w - ent.x);
      const overlapY = Math.min(ent.y + ent.size - w.y, w.y + w.h - ent.y);
      if (overlapX < overlapY) {
        if (ent.x + ent.size/2 < w.x + w.w/2) ent.x -= overlapX;
        else                                   ent.x += overlapX;
      } else {
        if (ent.y + ent.size/2 < w.y + w.h/2) ent.y -= overlapY;
        else                                   ent.y += overlapY;
      }
    }
  }
}

// 🧠 BOT AI — strafes around an ideal range, fires its gun
function enemyAI(e){
  const px = player.x + player.size/2;
  const py = player.y + player.size/2;
  const ex = e.x + e.size/2;
  const ey = e.y + e.size/2;
  const dx = px - ex, dy = py - ey;
  const dist = Math.hypot(dx, dy) || 1;

  // preferred firing range varies a bit per gun
  const g = GUN_STATS[e.gun] || GUN_STATS.pistol;
  const ideal = (g.kind === "pellet" || g.kind === "rocket") ? 160 : 240;

  let mx = 0, my = 0;
  if (dist > ideal + 30)      { mx = dx/dist;  my = dy/dist; }
  else if (dist < ideal - 30) { mx = -dx/dist; my = -dy/dist; }

  // strafing tangent (perpendicular to the line to player)
  e.strafeTimer--;
  if (e.strafeTimer <= 0) {
    e.strafeDir *= -1;
    e.strafeTimer = 60 + Math.random()*90;
  }
  const tanX = -dy/dist, tanY = dx/dist;
  mx += tanX * 0.6 * e.strafeDir;
  my += tanY * 0.6 * e.strafeDir;

  const ml = Math.hypot(mx, my) || 1;
  e.x += (mx / ml) * e.speed;
  e.y += (my / ml) * e.speed;
  e.aim = Math.atan2(dy, dx);

  // walls block bot too
  resolveWallCollisions(e);

  // shoot
  if (e.cooldown > 0) e.cooldown--;
  if (e.cooldown <= 0) botShoot(e);

  // contact damage if the bot rams the player
  if (hit(player, e) && player.inv <= 0) {
    applyDamage(8);
    player.inv = 40;
  }
}

// 🤖 BOT SHOOTING
function botShoot(e){
  const g = GUN_STATS[e.gun];
  e.cooldown = Math.max(8, Math.round(g.cooldown * e.cooldownMult));

  const ang0 = e.aim;
  const speed = g.speed;
  // cap insta-kill snipers; otherwise scale by dmgMult
  const baseDmg = (g.dmg >= 9999) ? 60 : g.dmg;
  const dmg  = Math.max(1, Math.round(baseDmg * e.dmgMult));
  const life = Math.ceil(g.range / speed);

  const fan = g.bullets || 1;
  const spreadBase = g.spread || 0;

  for (let i=0; i<fan; i++){
    const fanOffset = (fan === 1) ? 0 : (i - (fan-1)/2) * spreadBase;
    const wobble = (Math.random() - 0.5) * e.spread * 2;
    const ang = ang0 + fanOffset + wobble;
    enemyBullets.push({
      x: e.x + e.size/2,
      y: e.y + e.size/2,
      dx: Math.cos(ang) * speed,
      dy: Math.sin(ang) * speed,
      ang: ang,
      size: (g.kind === "rocket") ? 7 : (g.kind === "bolt" ? 4 : 5),
      dmg: dmg,
      life: life,
      pierce: 0, hits: 0,
      color: g.color,
      kind: g.kind,
      aoe: g.aoe || 0,
      aoeDmg: Math.round((g.aoeDmg || 0) * e.dmgMult)
    });
  }
}

// 💥 enemy AOE explosion (damages player only)
function explodeEnemyBullet(b){
  const r = b.aoe;
  const pcx = player.x + player.size/2;
  const pcy = player.y + player.size/2;
  const d   = Math.hypot(pcx - b.x, pcy - b.y);
  if (d < r && player.inv <= 0) {
    const falloff = 1 - (d / r) * 0.5;
    applyDamage(Math.round(b.aoeDmg * falloff));
    player.inv = 30;
  }
  explosions.push({ x:b.x, y:b.y, r:r, life:18, max:18 });
}

// 🎥 CAMERA
function updateCamera(){
  const w = world();
  const z = getZoom();
  const vw = VIEW_W() * z, vh = VIEW_H() * z;  // effective world view
  cam.x = (player.x + player.size/2) - vw/2;
  cam.y = (player.y + player.size/2) - vh/2;
  // If world is smaller than viewport, center the world; otherwise clamp to edges
  if (w.width  <= vw) cam.x = -(vw - w.width)  / 2;
  else cam.x = Math.max(0, Math.min(w.width  - vw, cam.x));
  if (w.height <= vh) cam.y = -(vh - w.height) / 2;
  else cam.y = Math.max(0, Math.min(w.height - vh, cam.y));
  // Refresh world mouse since zoom or camera may have changed
  updateWorldMouse();
}

// ⏪ ENTER LOBBY (between runs and at start)
function enterLobby(){
  scene = "lobby";
  level = 1;
  score = 0;
  savedNewRecord = false;
  bullets = [];
  enemies = [];
  crates = [];
  goldChests = [];
  ammoBoxes = [];
  healthPacks = [];
  pickups = [];
  explosions = [];
  buildings = [];
  walls = [];
  bushes = [];
  enemyBullets = [];
  airdrops = [];
  // a little greenery around the lobby HQ
  for (let i=0;i<10;i++){
    bushes.push({
      x: 60 + Math.random()*(lobby.width - 120),
      y: 60 + Math.random()*(lobby.height - 120),
      r: 14 + Math.random()*10,
      hp: 5, maxHp: 5
    });
  }
  resetPlayer(lobby.width/2 - 11, lobby.height/2 + 90); // below the portal
}

// ▶️ ENTER COMBAT
function enterCombat(){
  scene = "playing";
  level = 1;
  score = 0;
  savedNewRecord = false;
  bullets = [];
  levelTimer = 90 * 60;  // 1:30 countdown
  // keep upgrades fresh per run (start clean)
  resetPlayer(300, 300);
  spawnLevel();
}

// 🏅 RECORD CHECK
function commitBests(){
  let updated = false;
  if (level > bests.bestLevel) { bests.bestLevel = level; updated = true; }
  if (score > bests.bestScore) { bests.bestScore = score; updated = true; }
  if (updated) saveBests();
  return updated;
}

// ⏰ DEATH HANDLER
function onDeath(){
  scene = "gameover";
  if (!savedNewRecord) savedNewRecord = commitBests();
  setTimeout(enterLobby, 1800);
}

// 💬 FLOATING TEXT
function pushPickup(x, y, text, color){
  pickups.push({ x, y, text, color, life: 60 });
}

// 🎮 UPDATE
function update(){
  if (scene === "lobby"){
    move();
    updateCamera();
    // step on portal to start
    if (hit(player, { x:portal.x, y:portal.y, size:portal.size })) {
      enterCombat();
    }
    return;
  }

  if (scene === "gameover") return;

  // ===== PLAYING =====
  move();

  if(player.cooldown > 0) player.cooldown--;
  if(player.inv > 0) player.inv--;

  if(player.hp <= 0){ onDeath(); return; }

  // 🌍 PHYSICS ZONE EFFECTS — fire & nuclear damage ticks
  {
    const zone = getPlayerZone();
    physicsZones.forEach(z=>{ z.tick = (z.tick||0) + 1; });
    if (zone && (zone.type === "fire" || zone.type === "nuclear")){
      player.zoneDamageTick = (player.zoneDamageTick||0) + 1;
      const interval = zone.type === "fire" ? 25 : 35;  // fire hurts faster
      const dmg      = zone.type === "fire" ? 4  : 3;
      if (player.zoneDamageTick >= interval){
        player.zoneDamageTick = 0;
        player.hp -= dmg;
        const label = zone.type === "fire" ? "🔥 -"+dmg : "☢ -"+dmg;
        pushPickup(player.x, player.y, label, zone.type === "fire" ? "#ff6622" : "#66ff44");
      }
    } else {
      player.zoneDamageTick = 0;
    }
  }

  // ⏱️ LEVEL TIMER — bomb explodes if time runs out
  if (levelTimer > 0) levelTimer--;
  if (levelTimer === 0 && scene === "playing"){
    // Massive bomb explosion centred on player
    const bx = player.x + player.size/2, by = player.y + player.size/2;
    for (let i = 0; i < 6; i++){
      explosions.push({ x: bx + (Math.random()-0.5)*80, y: by + (Math.random()-0.5)*80,
                        r: 60 + Math.random()*60, life: 30, max: 30 });
    }
    pushPickup(bx, by, "💣 TIME'S UP!", "#ff3333");
    player.hp = 0;
    onDeath();
    return;
  }

  // ⚡ AIRDROPS — animate falling crates and convert them to pickups on landing
  for (let i = airdrops.length - 1; i >= 0; i--) {
    const a = airdrops[i];
    a.sway += 0.04;
    if (!a.landed) {
      a.y += a.fallSpeed;
      if (a.y >= a.targetY) {
        a.y = a.targetY;
        a.landed = true;
        // Promote to a regular crate so existing E-pickup logic works
        crates.push({
          x: a.x - 16, y: a.y - 16,
          size: 32,
          gun: a.gun,
          airdrop: true
        });
        // Tiny landing burst
        explosions.push({ x: a.x, y: a.y, r: 30, life: 12, max: 12 });
        airdrops.splice(i, 1);
      }
    }
  }

  // bullets
  bullets.forEach(b=>{ b.x += b.dx; b.y += b.dy; b.life--; });

  // bullets vs walls (rockets explode on impact)
  bullets.forEach(b=>{
    if (b.dead) return;
    for (const w of walls) {
      if (b.x > w.x && b.x < w.x + w.w &&
          b.y > w.y && b.y < w.y + w.h) {
        if (b.aoe) explodeBullet(b);
        b.dead = true;
        break;
      }
    }
  });

  // bullets vs bushes (foliage stops shots and slowly chips the bush apart)
  bullets.forEach(b=>{
    if (b.dead) return;
    for (let i = bushes.length - 1; i >= 0; i--) {
      const bu = bushes[i];
      const dx = b.x - bu.x, dy = b.y - bu.y;
      if (dx*dx + dy*dy < bu.r*bu.r) {
        if (b.aoe) {
          explodeBullet(b);
          bushes.splice(i, 1); // rocket vaporizes the bush
        } else {
          bu.hp -= 1;
          if (bu.hp <= 0) bushes.splice(i, 1);
        }
        b.dead = true;
        break;
      }
    }
  });

  // 🤖 ENEMY BULLETS — move, hit walls, hit player
  enemyBullets.forEach(b=>{ b.x += b.dx; b.y += b.dy; b.life--; });
  enemyBullets.forEach(b=>{
    if (b.dead) return;
    // walls block bot bullets too
    for (const w of walls) {
      if (b.x > w.x && b.x < w.x + w.w &&
          b.y > w.y && b.y < w.y + w.h) {
        if (b.aoe) explodeEnemyBullet(b);
        b.dead = true;
        return;
      }
    }
    // bushes block bot bullets too (and chip away over multiple hits)
    for (let i = bushes.length - 1; i >= 0; i--) {
      const bu = bushes[i];
      const dx = b.x - bu.x, dy = b.y - bu.y;
      if (dx*dx + dy*dy < bu.r*bu.r) {
        if (b.aoe) {
          explodeEnemyBullet(b);
          bushes.splice(i, 1);
        } else {
          bu.hp -= 1;
          if (bu.hp <= 0) bushes.splice(i, 1);
        }
        b.dead = true;
        return;
      }
    }
    // hit player
    if (player.x < b.x && b.x < player.x + player.size &&
        player.y < b.y && b.y < player.y + player.size) {
      if (b.aoe) {
        explodeEnemyBullet(b);
      } else if (player.inv <= 0) {
        applyDamage(b.dmg);
        player.inv = 30;
      }
      b.dead = true;
    }
  });
  // expire-life rockets explode where they died
  enemyBullets.forEach(b=>{
    if (!b.dead && b.aoe && b.life <= 0) { explodeEnemyBullet(b); b.dead = true; }
  });
  enemyBullets = enemyBullets.filter(b=>{
    if (b.dead) return false;
    if (b.life <= 0) return false;
    return b.x > -20 && b.y > -20 && b.x < dojo.width+20 && b.y < dojo.height+20;
  });

  // bullets vs enemies (with AOE, DoT, and minRange handling)
  bullets.forEach(b=>{
    if (b.dead) return;
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (hit(b,e)){
        // minRange penalty: snipers deal only 15% damage if bullet hasn't traveled far enough
        let actualDmg = b.dmg;
        if (b.minRange > 0){
          const traveled = Math.hypot(b.x - b.startX, b.y - b.startY);
          if (traveled < b.minRange) actualDmg = Math.max(1, Math.round(b.dmg * 0.15));
        }
        e.hp -= actualDmg;
        // Apply DoT (toxic/flamer) — cap to 4 stacks per enemy
        if (b.dot && (e.dotEffects||[]).length < 4){
          e.dotEffects = e.dotEffects || [];
          e.dotEffects.push({ dmg:b.dot.dmg, ticks:b.dot.ticks, interval:b.dot.interval, timer:b.dot.interval });
        }
        const killed = e.hp <= 0;
        if (killed){
          const coinReward = Math.floor(5 * Math.pow(1.3, level - 1));
          coins += coinReward;
          bests.coins += coinReward;
          score += 10 * level;
          pushPickup(e.x, e.y, "+" + coinReward + " 🪙", "#ffd24a");
        }
        if (b.aoe) { explodeBullet(b); b.dead = true; return; }
        if (b.pierce > 0) {
          b.hits++;
          if (b.hits >= b.pierce) { b.dead = true; return; }
        } else {
          b.dead = true; return;
        }
      }
    }
  });
  // rockets that run out of life still explode (so misses near the wall pop)
  bullets.forEach(b=>{
    if (!b.dead && b.aoe && b.life <= 0) { explodeBullet(b); b.dead = true; }
  });
  // cull bullets that ran out of range or left the world
  bullets = bullets.filter(b=>{
    if (b.dead) return false;
    if (b.life <= 0) return false;
    return b.x > -20 && b.y > -20 && b.x < dojo.width+20 && b.y < dojo.height+20;
  });

  enemies.forEach(enemyAI);

  // crates: now picked up by E (handled in tryPickupNearby), just remove dead ones
  crates = crates.filter(c=>!c.dead);

  // health packs: heal +25 (don't pick up at full hp)
  healthPacks.forEach(h=>{
    h.pulse = (h.pulse || 0) + 0.1;
    if (player.hp < player.maxHp && hit(player,h)){
      const before = player.hp;
      player.hp = Math.min(player.maxHp, player.hp + 25);
      pushPickup(h.x, h.y, "+" + (player.hp - before) + " HP", "#7CFC00");
      h.dead = true;
    }
  });
  healthPacks = healthPacks.filter(h=>!h.dead);

  // gold chests: permanent run upgrades
  goldChests.forEach(g=>{
    g.pulse += 0.08;
    if(hit(player,g)){
      const upgrade = applyGoldUpgrade();
      score += 75;
      pushPickup(g.x, g.y, upgrade, "#ffd24a");
      g.dead = true;
    }
  });
  goldChests = goldChests.filter(g=>!g.dead);

  // ammo boxes — top up every gun in inventory
  ammoBoxes.forEach(a=>{
    if(hit(player,a)){
      player.inventory.forEach(s=>{
        if (s) {
          const g = GUN_STATS[s.gun];
          s.ammo = Math.min((g.maxAmmo || 999) + 100, s.ammo + 25);
        }
      });
      pickups.push({ x:a.x, y:a.y, text:"+Ammo", color:"#ffd24a", life:40 });
      a.dead = true;
    }
  });
  ammoBoxes = ammoBoxes.filter(a=>!a.dead);

  // 🟢 Enemy DoT ticks (toxic/flamer burning)
  enemies.forEach(e=>{
    if (!e.dotEffects || e.dotEffects.length === 0) return;
    for (let i = e.dotEffects.length - 1; i >= 0; i--){
      const d = e.dotEffects[i];
      d.timer--;
      if (d.timer <= 0){
        e.hp -= d.dmg;
        d.ticks--;
        if (d.ticks <= 0) e.dotEffects.splice(i, 1);
        else d.timer = d.interval;
      }
    }
  });

  // dead enemies
  enemies = enemies.filter(e=>e.hp > 0);

  // pickups text float
  pickups.forEach(p=>{ p.y -= 0.4; p.life--; });
  pickups = pickups.filter(p=>p.life > 0);

  explosions.forEach(ex=>{ ex.life--; });
  explosions = explosions.filter(ex=>ex.life > 0);

  // next level
  if(enemies.length === 0){
    score += 50 * level;
    // Exponential coin reward for clearing a level
    const levelCoins = Math.floor(20 * Math.pow(1.5, level - 1));
    coins += levelCoins;
    bests.coins += levelCoins;
    saveBests();
    pushPickup(player.x, player.y + 20, "+" + levelCoins + " 🪙 level clear!", "#ffd24a");
    level++;
    commitBests();
    spawnLevel();
  }

  updateCamera();
}

// =====================================================================
// 🎨 NINJA SPRITE
// Draws a small ninja at world (x,y). `color` is the suit color.
// `aim` is the facing angle in radians (for body rotation).
// =====================================================================
function drawNinja(x, y, size, color, aim, opts){
  opts = opts || {};
  const sx = x - cam.x + size/2;
  const sy = y - cam.y + size/2;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(aim + Math.PI/2); // rotate so head points toward aim

  const s = size;
  // body (suit)
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 0.05*s, s*0.42, s*0.55, 0, 0, Math.PI*2);
  ctx.fill();

  // 🛡️ armor SUIT plate (chestpiece) — drawn over the body when equipped
  if (opts.armorColor) {
    ctx.fillStyle = opts.armorColor;
    ctx.beginPath();
    ctx.ellipse(0, -0.02*s, s*0.34, s*0.36, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = opts.armorTrim || "#000";
    ctx.lineWidth = Math.max(1, s*0.04);
    ctx.stroke();
  }

  // belt
  ctx.fillStyle = opts.belt || "#c0392b";
  ctx.fillRect(-s*0.42, s*0.0, s*0.84, s*0.12);

  // head
  ctx.fillStyle = "#f1c27d"; // skin
  ctx.beginPath();
  ctx.arc(0, -s*0.45, s*0.28, 0, Math.PI*2);
  ctx.fill();

  // mask band over eyes
  ctx.fillStyle = color;
  ctx.fillRect(-s*0.30, -s*0.55, s*0.60, s*0.18);

  // 🪖 armor HELMET — colored cap above the head (from armorColor, only if no helmetColor)
  if (opts.armorColor && !opts.helmetColor) {
    ctx.fillStyle = opts.armorColor;
    ctx.beginPath();
    ctx.arc(0, -s*0.50, s*0.30, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = opts.armorTrim || "#000";
    ctx.lineWidth = Math.max(1, s*0.04);
    ctx.stroke();
    ctx.fillStyle = opts.armorTrim || "#000";
    ctx.fillRect(-s*0.30, -s*0.50, s*0.60, s*0.04);
  }

  // 🪖 purchased HELMET (from HELMET_SHOP) — drawn over the head with visor
  if (opts.helmetColor) {
    ctx.fillStyle = opts.helmetColor;
    ctx.beginPath();
    ctx.arc(0, -s*0.48, s*0.33, Math.PI, 0);
    ctx.fill();
    // visor strip
    ctx.fillStyle = opts.helmetTrim || "rgba(0,0,0,0.7)";
    ctx.fillRect(-s*0.30, -s*0.53, s*0.60, s*0.12);
    ctx.strokeStyle = opts.helmetTrim || "#000";
    ctx.lineWidth = Math.max(1, s*0.05);
    ctx.beginPath();
    ctx.arc(0, -s*0.48, s*0.33, Math.PI, 0);
    ctx.stroke();
  }

  // eyes
  ctx.fillStyle = "#fff";
  ctx.fillRect(-s*0.18, -s*0.50, s*0.10, s*0.06);
  ctx.fillRect( s*0.08, -s*0.50, s*0.10, s*0.06);

  // headband tail (flowing back, opposite of facing)
  ctx.fillStyle = opts.belt || "#c0392b";
  ctx.beginPath();
  ctx.moveTo(s*0.18, -s*0.55);
  ctx.lineTo(s*0.55, -s*0.30);
  ctx.lineTo(s*0.18, -s*0.42);
  ctx.closePath();
  ctx.fill();

  // arms holding gun out front
  ctx.fillStyle = color;
  ctx.fillRect(-s*0.48, -s*0.20, s*0.18, s*0.30);
  ctx.fillRect( s*0.30, -s*0.20, s*0.18, s*0.30);

  // gun (drawn pointing "up" in this rotated frame, i.e. toward aim)
  drawGunShape(opts.gunKind || null, s);

  ctx.restore();
}

// Draws a small gun pointing in -Y direction (in current transform).
// Used both inside drawNinja and as a standalone icon (via drawGunIcon).
function drawGunShape(kind, s){
  switch (kind) {
    case "smg":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.07, -s*0.55, s*0.14, s*0.55);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.16, -s*0.40, s*0.08, s*0.20); // mag
      ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.10); // grip
      break;
    case "shotgun":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.07, -s*0.95, s*0.14, s*0.85); // long barrel
      ctx.fillStyle="#7a4d22"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.18); // wood stock
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.04, -s*0.50, s*0.08, s*0.10); // pump
      break;
    case "sniper":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.05, -s*1.05, s*0.10, s*0.95); // very long barrel
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.12, -s*0.60, s*0.24, s*0.10); // scope
      ctx.fillStyle="#7a4d22"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.20); // stock
      break;
    case "ar15":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.06, -s*0.85, s*0.12, s*0.70);
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.12, -s*0.30, s*0.08, s*0.18); // mag
      ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.16); // body
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.04, -s*0.20, s*0.08, s*0.04); // sight
      break;
    case "minigun":
      ctx.fillStyle="#2b2b2b";
      for (let i=-2;i<=2;i++){
        ctx.fillRect(-s*0.06 + i*s*0.05, -s*0.80, s*0.04, s*0.65);
      }
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.18, -s*0.20, s*0.36, s*0.18);
      break;
    case "rocket":
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.10, -s*0.95, s*0.20, s*0.85);
      ctx.fillStyle="#c0392b"; ctx.fillRect(-s*0.12, -s*0.45, s*0.24, s*0.08); // band
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.18);
      break;
    case "crossbow":
      // bow arms
      ctx.strokeStyle="#7a4d22"; ctx.lineWidth = Math.max(1.5, s*0.06);
      ctx.beginPath();
      ctx.moveTo(-s*0.40, -s*0.20);
      ctx.quadraticCurveTo(0, -s*0.50, s*0.40, -s*0.20);
      ctx.stroke();
      // string
      ctx.strokeStyle="#ddd"; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-s*0.40, -s*0.20); ctx.lineTo(s*0.40, -s*0.20);
      ctx.stroke();
      // stock + bolt
      ctx.fillStyle="#7a4d22"; ctx.fillRect(-s*0.05, -s*0.15, s*0.10, s*0.40);
      ctx.fillStyle="#a08060"; ctx.fillRect(-s*0.02, -s*0.65, s*0.04, s*0.55);
      break;
    case "laser":
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.08, -s*0.75, s*0.16, s*0.60);
      ctx.fillStyle="#ff4ad1"; ctx.fillRect(-s*0.04, -s*0.85, s*0.08, s*0.10); // emitter
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.18);
      break;
    case "flak":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.12, -s*0.70, s*0.24, s*0.55);
      ctx.fillStyle="#b3ff66"; ctx.fillRect(-s*0.09, -s*0.78, s*0.18, s*0.10);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.18);
      break;
    case "revolver":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.06, -s*0.55, s*0.12, s*0.45);
      ctx.fillStyle="#888";    ctx.beginPath(); ctx.arc(0, -s*0.18, s*0.13, 0, Math.PI*2); ctx.fill(); // cylinder
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.04, -s*0.10, s*0.10, s*0.20);
      break;
    case "pumpgun":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.07, -s*0.85, s*0.14, s*0.75);
      ctx.fillStyle="#5a3010"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.20); // dark wood stock
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.05, -s*0.55, s*0.10, s*0.14); // pump
      break;
    case "carbine":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.05, -s*0.75, s*0.10, s*0.62);
      ctx.fillStyle="#7a4d22"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.18);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.06, -s*0.30, s*0.12, s*0.06);
      break;
    case "doublepistol":
      ctx.fillStyle="#2b2b2b";
      ctx.fillRect(-s*0.18, -s*0.50, s*0.10, s*0.40);
      ctx.fillRect( s*0.08, -s*0.50, s*0.10, s*0.40);
      ctx.fillStyle="#3a3a3a";
      ctx.fillRect(-s*0.18, -s*0.10, s*0.10, s*0.16);
      ctx.fillRect( s*0.08, -s*0.10, s*0.10, s*0.16);
      break;
    case "burstrifle":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.06, -s*0.85, s*0.12, s*0.72);
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.16);
      ctx.fillStyle="#ffc04a"; ctx.fillRect(-s*0.04, -s*0.20, s*0.08, s*0.04);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.12, -s*0.30, s*0.08, s*0.18);
      break;
    case "plasma":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.08, -s*0.75, s*0.16, s*0.60);
      ctx.fillStyle="#7affd0"; ctx.beginPath(); ctx.arc(0, -s*0.80, s*0.10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.18);
      break;
    case "railgun":
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.05, -s*1.10, s*0.10, s*1.00);
      ctx.fillStyle="#aaffff"; ctx.fillRect(-s*0.04, -s*1.10, s*0.08, s*0.08);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.16, -s*0.55, s*0.32, s*0.10); // coils
      ctx.fillRect(-s*0.16, -s*0.35, s*0.32, s*0.10);
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.20);
      break;
    case "bfg":
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.18, -s*0.85, s*0.36, s*0.70);
      ctx.fillStyle="#aaff66"; ctx.beginPath(); ctx.arc(0, -s*0.55, s*0.14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.14, -s*0.10, s*0.28, s*0.20);
      break;
    case "thunder":
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.08, -s*0.85, s*0.16, s*0.70);
      ctx.fillStyle="#dceaff"; ctx.fillRect(-s*0.06, -s*0.95, s*0.12, s*0.12);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.14, -s*0.40, s*0.28, s*0.08);
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.10, -s*0.10, s*0.20, s*0.20);
      break;
    case "masterbolt":
      // Zeus's thunderbolt — golden zig-zag + glow
      ctx.fillStyle = "rgba(255,210,74,0.35)";
      ctx.beginPath(); ctx.arc(0, -s*0.45, s*0.45, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#ffd24a";
      ctx.beginPath();
      ctx.moveTo(-s*0.10, -s*0.95);
      ctx.lineTo( s*0.10, -s*0.55);
      ctx.lineTo(-s*0.05, -s*0.40);
      ctx.lineTo( s*0.15, -s*0.05);
      ctx.lineTo( 0,        s*0.05);
      ctx.lineTo(-s*0.18, -s*0.30);
      ctx.lineTo( s*0.02, -s*0.50);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "#a8780a"; ctx.lineWidth = 1; ctx.stroke();
      break;
    case "trident":
      // Poseidon's trident — bronze pole with 3 prongs
      ctx.fillStyle = "#7a4d22";
      ctx.fillRect(-s*0.04, -s*0.50, s*0.08, s*0.55); // shaft
      ctx.fillStyle = "#3aa0ff";
      // outer prongs
      ctx.beginPath();
      ctx.moveTo(-s*0.30, -s*0.60); ctx.lineTo(-s*0.20, -s*1.00); ctx.lineTo(-s*0.10, -s*0.60); ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo( s*0.10, -s*0.60); ctx.lineTo( s*0.20, -s*1.00); ctx.lineTo( s*0.30, -s*0.60); ctx.closePath();
      ctx.fill();
      // middle prong (taller)
      ctx.beginPath();
      ctx.moveTo(-s*0.10, -s*0.60); ctx.lineTo(0, -s*1.10); ctx.lineTo( s*0.10, -s*0.60); ctx.closePath();
      ctx.fill();
      // crossbar
      ctx.fillStyle = "#7a4d22";
      ctx.fillRect(-s*0.32, -s*0.62, s*0.64, s*0.06);
      break;
    case "pistol":
    default:
      ctx.fillStyle="#2b2b2b"; ctx.fillRect(-s*0.06, -s*0.55, s*0.12, s*0.45);
      ctx.fillStyle="#5a5a5a"; ctx.fillRect(-s*0.10, -s*0.20, s*0.20, s*0.10); // body
      ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s*0.04, -s*0.10, s*0.10, s*0.18); // grip
      break;
  }
}

// Draw a gun icon at screen coords (cx, cy) with size `s`, rotated `rot` rad.
function drawGunIcon(kind, cx, cy, s, rot){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot || 0);
  drawGunShape(kind, s);
  ctx.restore();
}

// 💥 EXPLOSION (player-fired) — damages enemies AND the player if in blast radius
function explodeBullet(b){
  const r = b.aoe || 60;
  const dmg = b.aoeDmg || Math.round(b.dmg * 0.6);
  // damage all enemies in radius
  enemies.forEach(e=>{
    if (e.hp <= 0) return;
    const ex = e.x + e.size/2, ey = e.y + e.size/2;
    const d = Math.hypot(ex - b.x, ey - b.y);
    if (d < r) {
      const falloff = 1 - (d / r) * 0.5;
      e.hp -= Math.round(dmg * falloff);
      if (e.hp <= 0) score += 10 * level;
    }
  });
  // 💢 SELF-DAMAGE — careful with that rocket launcher!
  const pcx = player.x + player.size/2;
  const pcy = player.y + player.size/2;
  const pd  = Math.hypot(pcx - b.x, pcy - b.y);
  if (pd < r && player.inv <= 0) {
    const falloff = 1 - (pd / r) * 0.5;
    applyDamage(Math.round(dmg * falloff));
    player.inv = 25;
    pushPickup(pcx, pcy - 16, "Self-damage!", "#ff6b6b");
  }
  explosions.push({ x:b.x, y:b.y, r:r, life:18, max:18 });
}

// 🔫 BULLET RENDER
function drawBullet(b){
  const x = b.x - cam.x, y = b.y - cam.y;
  const ang = b.ang || Math.atan2(b.dy, b.dx);
  switch (b.kind) {
    case "tracer": {
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - b.dx*0.7, y - b.dy*0.7);
      ctx.lineTo(x, y);
      ctx.stroke();
      break;
    }
    case "beam": {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      ctx.fillStyle = b.color;
      ctx.fillRect(-12, -1.5, 14, 3);
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.fillRect(-8, -0.5, 8, 1);
      ctx.restore();
      break;
    }
    case "bolt": {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // shaft
      ctx.fillStyle = "#a08060";
      ctx.fillRect(-10, -1, 12, 2);
      // arrowhead
      ctx.fillStyle = "#cccccc";
      ctx.beginPath();
      ctx.moveTo(2, 0); ctx.lineTo(-2, -3); ctx.lineTo(-2, 3); ctx.closePath();
      ctx.fill();
      // fletching
      ctx.fillStyle = "#c0392b";
      ctx.beginPath();
      ctx.moveTo(-10, 0); ctx.lineTo(-13, -3); ctx.lineTo(-13, 3); ctx.closePath();
      ctx.fill();
      ctx.restore();
      break;
    }
    case "rocket": {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      // smoke trail
      for (let i=1;i<=4;i++){
        ctx.fillStyle = "rgba(180,180,180," + (0.25 - i*0.05) + ")";
        ctx.beginPath();
        ctx.arc(-i*4, 0, 3 - i*0.3, 0, Math.PI*2);
        ctx.fill();
      }
      // body
      ctx.fillStyle = "#3a3a3a";
      ctx.fillRect(-6, -3, 10, 6);
      // tip
      ctx.fillStyle = "#c0392b";
      ctx.beginPath();
      ctx.moveTo(4, 0); ctx.lineTo(-2, -3); ctx.lineTo(-2, 3); ctx.closePath();
      ctx.fill();
      // fins
      ctx.fillStyle = "#5a5a5a";
      ctx.fillRect(-7, -4, 2, 2);
      ctx.fillRect(-7,  2, 2, 2);
      ctx.restore();
      break;
    }
    case "pellet": {
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(x, y, b.size, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case "plasma": {
      // glowing orb with bright core
      ctx.fillStyle = "rgba(122,255,208,0.35)";
      ctx.beginPath();
      ctx.arc(x, y, b.size + 3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(x, y, b.size, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(x, y, Math.max(1, b.size*0.4), 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case "round":
    default: {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang);
      ctx.fillStyle = b.color;
      // capsule-ish bullet shape
      ctx.fillRect(-3, -1.5, 4, 3);
      ctx.beginPath();
      ctx.arc(1, 0, 1.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#a07020";
      ctx.fillRect(-5, -1.5, 2, 3); // brass casing tail
      ctx.restore();
      break;
    }
  }
}

// 🎒 INVENTORY BAR (bottom of canvas) — positioned dynamically each frame
const INV_BAR = { x: 0, y: 0, slotW: 52, slotH: 40, gap: 6 };
function updateInvBarPos(){
  INV_BAR.x = VIEW_W()/2 - (5*INV_BAR.slotW + 4*INV_BAR.gap)/2;
  INV_BAR.y = VIEW_H() - 60;
}

function slotAtScreen(mx, my){
  updateInvBarPos();
  if (my < INV_BAR.y - 4 || my > INV_BAR.y + INV_BAR.slotH + 4) return -1;
  for (let i=0;i<MAX_INVENTORY;i++){
    const x = INV_BAR.x + i*(INV_BAR.slotW + INV_BAR.gap);
    if (mx >= x && mx < x + INV_BAR.slotW) return i;
  }
  return -1;
}

function drawInventoryBar(){
  // backdrop
  const totalW = MAX_INVENTORY * INV_BAR.slotW + (MAX_INVENTORY-1) * INV_BAR.gap;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(INV_BAR.x - 6, INV_BAR.y - 6, totalW + 12, INV_BAR.slotH + 12);

  for (let i=0;i<MAX_INVENTORY;i++){
    const x = INV_BAR.x + i*(INV_BAR.slotW + INV_BAR.gap);
    const y = INV_BAR.y;
    const entry = player.inventory[i];
    const active = (i === player.activeSlot && entry);

    // slot box
    ctx.fillStyle = entry ? "#2b2b2b" : "#1a1d22";
    ctx.fillRect(x, y, INV_BAR.slotW, INV_BAR.slotH);
    // rarity-tinted border (selected slot wins with bright yellow)
    let borderColor = "#444";
    if (entry) {
      const r = GUN_STATS[entry.gun] && GUN_STATS[entry.gun].rarity;
      if (r && RARITY[r]) borderColor = RARITY[r].color;
    }
    if (active) borderColor = "#ffd24a";
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = active ? 2 : 1.5;
    ctx.strokeRect(x+0.5, y+0.5, INV_BAR.slotW-1, INV_BAR.slotH-1);

    // hotkey
    ctx.fillStyle = "#888";
    ctx.font = "bold 9px Arial";
    ctx.textAlign = "left";
    ctx.fillText(String(i+1), x + 3, y + 10);

    if (entry) {
      // gun icon centered
      drawGunIcon(entry.gun, x + INV_BAR.slotW/2, y + INV_BAR.slotH/2 - 2, 16, 0);
      // ammo count bottom-right
      ctx.fillStyle = entry.ammo === 0 ? "#ff6b6b" : "#fff";
      ctx.font = "bold 10px Arial";
      ctx.textAlign = "right";
      ctx.fillText(entry.ammo, x + INV_BAR.slotW - 3, y + INV_BAR.slotH - 3);
    } else {
      ctx.fillStyle = "#444";
      ctx.font = "10px Arial";
      ctx.textAlign = "center";
      ctx.fillText("empty", x + INV_BAR.slotW/2, y + INV_BAR.slotH/2 + 3);
    }
  }
  ctx.textAlign = "start";

  // dragging preview (gun follows cursor)
  if (dragSlot !== null && player.inventory[dragSlot]) {
    const entry = player.inventory[dragSlot];
    drawGunIcon(entry.gun, mouseScreen.x, mouseScreen.y, 18, 0);
    // hint text if outside the bar
    if (slotAtScreen(mouseScreen.x, mouseScreen.y) < 0) {
      ctx.fillStyle = "#ff8080";
      ctx.font = "bold 11px Arial";
      ctx.textAlign = "center";
      ctx.fillText("release to drop", mouseScreen.x, mouseScreen.y - 14);
      ctx.textAlign = "start";
    }
  }
}

// 🎨 DRAW
function draw(){
  updateInvBarPos();
  ctx.clearRect(0,0,VIEW_W(),VIEW_H());

  if (scene === "lobby") {
    drawLobby();
  } else {
    drawCombat();
    drawAirdropPointer();      // off-screen yellow arrow toward active airdrop
    if (mapOpen) drawMinimap();
    else         drawMapHint();
  }

  if (shopOpen) drawShopOverlay();
  drawCrosshair();
}

// Tiny corner hint reminding the player how to open the map.
function drawMapHint(){
  const vw = VIEW_W();
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(vw - 92, 6, 86, 18);
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 1;
  ctx.strokeRect(vw - 92 + 0.5, 6.5, 85, 17);
  ctx.fillStyle = "#ffd24a";
  ctx.font = "bold 11px Arial";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText("🗺️ M  Map", vw - 86, 16);
}

// ⚡ AIRDROP POINTER — yellow arrow on screen edge pointing toward an active
// airdrop crate (falling or landed). Hidden when the airdrop is on-screen.
function drawAirdropPointer(){
  if (!airdrops.length) return;
  const vw = VIEW_W(), vh = VIEW_H();
  const cx = vw / 2, cy = vh / 2;
  const z = getZoom();
  for (const a of airdrops){
    const wx = a.x, wy = a.y;
    // Project world to screen accounting for current zoom
    const sx = (wx - cam.x) / z, sy = (wy - cam.y) / z;
    // If on-screen, draw a soft pulsing halo around it instead of an arrow
    if (sx >= 0 && sx <= vw && sy >= 0 && sy <= vh){
      const pulse = 1 + 0.35 * Math.sin(Date.now()/180);
      ctx.strokeStyle = "rgba(255,210,74,0.85)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, 28 * pulse, 0, Math.PI*2);
      ctx.stroke();
      continue;
    }
    // Off-screen: draw arrow on the edge pointing toward it
    const dx = sx - cx, dy = sy - cy;
    const ang = Math.atan2(dy, dx);
    const margin = 36;
    const halfW = cx - margin, halfH = cy - margin;
    // Project onto the edge rectangle
    const t = Math.min(halfW / Math.abs(dx || 1), halfH / Math.abs(dy || 1));
    const ex = cx + dx * t, ey = cy + dy * t;
    // Distance label (in tiles ~ 32px each)
    const dist = Math.round(Math.hypot(wx - (player.x + player.size/2), wy - (player.y + player.size/2)) / 32);
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(ang);
    // arrow body
    ctx.fillStyle = "rgba(255,210,74,0.95)";
    ctx.beginPath();
    ctx.moveTo(16, 0);
    ctx.lineTo(-10, -10);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-10, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.7)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
    // distance label next to arrow
    ctx.fillStyle = "#ffd24a";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const lx = ex - Math.cos(ang) * 26;
    const ly = ey - Math.sin(ang) * 26;
    ctx.fillText("⚡ " + dist + "m", lx, ly);
  }
}

// 🗺️ MINIMAP — large centered overlay opened/closed with M.
function drawMinimap(){
  // size: as big as fits in the canvas with some padding
  const vw = VIEW_W(), vh = VIEW_H();
  const pad = 24;
  const maxW = vw - pad*2;
  const maxH = vh - pad*2;
  const ratio = dojo.width / dojo.height;
  let mw = maxW, mh = mw / ratio;
  if (mh > maxH) { mh = maxH; mw = mh * ratio; }
  const mx = (vw - mw) / 2;
  const my = (vh - mh) / 2;
  const sx = mw / dojo.width;   // world → minimap scale X
  const sy = mh / dojo.height;  // world → minimap scale Y

  // background
  ctx.fillStyle = "rgba(10,12,16,0.78)";
  ctx.fillRect(mx, my, mw, mh);
  // border
  ctx.strokeStyle = "rgba(255,255,255,0.55)";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(mx + 0.5, my + 0.5, mw - 1, mh - 1);

  // current camera viewport rectangle
  const vrx = mx + cam.x * sx;
  const vry = my + cam.y * sy;
  const vrw = VIEW_W() * sx;
  const vrh = VIEW_H() * sy;
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 1;
  ctx.strokeRect(vrx, vry, vrw, vrh);

  // buildings (apartments) — dark filled rects
  ctx.fillStyle = "#3a3f48";
  ctx.strokeStyle = "#7a8290";
  ctx.lineWidth = 0.8;
  for (const b of buildings) {
    const bx = mx + b.x * sx, by = my + b.y * sy;
    const bw = b.w * sx,      bh = b.h * sy;
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
  }

  // helper: small marker
  function dot(wx, wy, color, r){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(mx + wx * sx, my + wy * sy, r, 0, Math.PI*2);
    ctx.fill();
  }

  // ammo boxes (cyan)
  for (const a of ammoBoxes) dot(a.x + a.size/2, a.y + a.size/2, "#5cc8ff", 3);
  // health packs (pink)
  for (const h of healthPacks) dot(h.x + h.size/2, h.y + h.size/2, "#ff6fae", 3.5);
  // crates (white)
  for (const c of crates) dot(c.x + c.size/2, c.y + c.size/2, "#ffffff", 3);
  // gold chests (gold)
  for (const g of goldChests) dot(g.x + g.size/2, g.y + g.size/2, "#ffd24a", 4);

  // airdrops — pulsing yellow lightning marker
  for (const a of airdrops) {
    const ax = mx + a.x * sx, ay = my + a.y * sy;
    const pulse = 1 + 0.4 * Math.sin(Date.now()/180);
    ctx.fillStyle = "rgba(255,210,74,0.35)";
    ctx.beginPath();
    ctx.arc(ax, ay, 14 * pulse, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#ffd24a";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("⚡", ax, ay);
  }

  // bot enemies (red)
  for (const e of enemies) {
    const ex = mx + (e.x + e.size/2) * sx;
    const ey = my + (e.y + e.size/2) * sy;
    // outer halo for visibility
    ctx.fillStyle = "rgba(255,80,80,0.35)";
    ctx.beginPath();
    ctx.arc(ex, ey, 9, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#ff4d4d";
    ctx.beginPath();
    ctx.arc(ex, ey, 5, 0, Math.PI*2);
    ctx.fill();
    // "BOT" label
    ctx.fillStyle = "#ffdcdc";
    ctx.font = "bold 9px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.fillText("BOT", ex, ey - 8);
  }

  // player (green) with facing arrow
  if (player) {
    const px = mx + (player.x + player.size/2) * sx;
    const py = my + (player.y + player.size/2) * sy;
    ctx.fillStyle = "#5dd16f";
    ctx.beginPath();
    ctx.arc(px, py, 5.5, 0, Math.PI*2);
    ctx.fill();
    // facing line
    ctx.strokeStyle = "#5dd16f";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(player.aim) * 14, py + Math.sin(player.aim) * 14);
    ctx.stroke();
    // "YOU" label
    ctx.fillStyle = "#d8ffd8";
    ctx.font = "bold 9px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.fillText("YOU", px, py - 9);
  }

  // title + close hint
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.font = "bold 13px Arial";
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("🗺️ Dojo Map", mx + 8, my + 16);
  ctx.fillStyle = "rgba(255,210,74,0.95)";
  ctx.font = "bold 11px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Press M to close", mx + mw - 8, my + 16);
}

function drawCrosshair(){
  // skip if mouse hasn't moved into canvas yet
  if (mouseScreen.x <= 0 && mouseScreen.y <= 0) return;
  const x = mouseScreen.x, y = mouseScreen.y;
  const r = 10, gap = 3, t = 2;
  // black outline for visibility on any background
  ctx.strokeStyle = "rgba(0,0,0,0.85)";
  ctx.lineWidth = t + 2;
  ctx.beginPath();
  ctx.moveTo(x - r, y); ctx.lineTo(x - gap, y);
  ctx.moveTo(x + gap, y); ctx.lineTo(x + r, y);
  ctx.moveTo(x, y - r); ctx.lineTo(x, y - gap);
  ctx.moveTo(x, y + gap); ctx.lineTo(x, y + r);
  ctx.stroke();
  // bright inner cross
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = t;
  ctx.beginPath();
  ctx.moveTo(x - r, y); ctx.lineTo(x - gap, y);
  ctx.moveTo(x + gap, y); ctx.lineTo(x + r, y);
  ctx.moveTo(x, y - r); ctx.lineTo(x, y - gap);
  ctx.moveTo(x, y + gap); ctx.lineTo(x, y + r);
  ctx.stroke();
  // center dot
  ctx.fillStyle = "#ff5555";
  ctx.beginPath();
  ctx.arc(x, y, 1.6, 0, Math.PI*2);
  ctx.fill();
}

// 🌍 PHYSICS ZONES RENDERER
const ZONE_STYLE = {
  water:   { base:"rgba(30,120,255,0.30)",  border:"rgba(80,160,255,0.7)",  label:"💧 WATER",   labelCol:"#88ccff" },
  ice:     { base:"rgba(200,240,255,0.28)", border:"rgba(180,230,255,0.75)",label:"❄ ICE",      labelCol:"#ccf0ff" },
  fire:    { base:"rgba(255,80,0,0.28)",    border:"rgba(255,160,30,0.80)", label:"🔥 FIRE",    labelCol:"#ff9944" },
  forest:  { base:"rgba(30,110,30,0.32)",   border:"rgba(60,160,60,0.70)",  label:"🌲 FOREST",  labelCol:"#88dd88" },
  nuclear: { base:"rgba(80,255,60,0.22)",   border:"rgba(120,255,80,0.75)", label:"☢ NUCLEAR",  labelCol:"#99ff44" }
};
function drawPhysicsZones(){
  const t = Date.now();
  for (const z of physicsZones){
    const sx = z.x - cam.x, sy = z.y - cam.y;
    const st = ZONE_STYLE[z.type] || ZONE_STYLE.water;
    // animated fill — different patterns per type
    if (z.type === "water"){
      // rippling water using sine-shifted fill rows
      ctx.fillStyle = st.base;
      ctx.fillRect(sx, sy, z.w, z.h);
      ctx.strokeStyle = "rgba(120,200,255,0.25)";
      ctx.lineWidth = 1.5;
      for (let wy=0; wy < z.h; wy += 18){
        const waveOff = Math.sin((t/600) + wy*0.2) * 6;
        ctx.beginPath();
        ctx.moveTo(sx, sy+wy+waveOff);
        for (let wx=0; wx<=z.w; wx+=12){
          ctx.lineTo(sx+wx, sy+wy + Math.sin((t/500)+wx*0.25)*5 + waveOff);
        }
        ctx.stroke();
      }
    } else if (z.type === "ice"){
      ctx.fillStyle = st.base;
      ctx.fillRect(sx, sy, z.w, z.h);
      // crystalline shimmer lines
      ctx.strokeStyle = "rgba(220,245,255,0.35)";
      ctx.lineWidth = 1;
      for (let i=0; i<8; i++){
        const angle = (i/8)*Math.PI + (t/4000);
        const mx = sx + z.w/2 + Math.cos(angle)*z.w*0.4;
        const my = sy + z.h/2 + Math.sin(angle)*z.h*0.4;
        ctx.beginPath();
        ctx.moveTo(sx+z.w/2, sy+z.h/2);
        ctx.lineTo(mx, my);
        ctx.stroke();
      }
    } else if (z.type === "fire"){
      // flickering flame fill
      const flicker = 0.25 + 0.07*Math.sin(t/80);
      ctx.fillStyle = `rgba(255,80,0,${flicker})`;
      ctx.fillRect(sx, sy, z.w, z.h);
      // fire columns
      for (let fx=0; fx<z.w; fx+=22){
        const ht = 14 + 12*Math.sin((t/160) + fx*0.3);
        const grad = ctx.createLinearGradient(sx+fx, sy+z.h, sx+fx, sy+z.h-ht);
        grad.addColorStop(0,"rgba(255,60,0,0.8)");
        grad.addColorStop(0.5,"rgba(255,150,20,0.5)");
        grad.addColorStop(1,"rgba(255,220,60,0.0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(sx+fx, sy+z.h-ht/2, 8+4*Math.random(), ht/2, 0, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (z.type === "forest"){
      ctx.fillStyle = st.base;
      ctx.fillRect(sx, sy, z.w, z.h);
      // scattered tree dots
      const seed = (z.x * 31 + z.y * 17) | 0;
      for (let i=0; i<12; i++){
        const tx = sx + ((seed*31+i*73)%100)/100 * z.w;
        const ty = sy + ((seed*17+i*43)%100)/100 * z.h;
        const tr = 9 + ((seed+i)%6);
        ctx.fillStyle = "#1a5e20";
        ctx.beginPath(); ctx.arc(tx, ty, tr, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2d8a35";
        ctx.beginPath(); ctx.arc(tx-tr*0.3, ty-tr*0.3, tr*0.65, 0, Math.PI*2); ctx.fill();
      }
    } else if (z.type === "nuclear"){
      // glowing toxic green
      const pulse = 0.18 + 0.08*Math.sin(t/300);
      ctx.fillStyle = `rgba(80,255,60,${pulse})`;
      ctx.fillRect(sx, sy, z.w, z.h);
      // bubbling waste circles
      for (let i=0; i<6; i++){
        const bx = sx + (((z.x+i*77)%100)/100)*z.w;
        const by = sy + (((z.y+i*53)%100)/100)*z.h;
        const br = 10 + 6*Math.sin(t/400 + i);
        ctx.fillStyle = "rgba(120,255,70,0.35)";
        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
      }
      // hazard symbol hint
      ctx.font = "22px Arial";
      ctx.textAlign = "center";
      ctx.globalAlpha = 0.3 + 0.1*Math.sin(t/500);
      ctx.fillStyle = "#aaff44";
      ctx.fillText("☢", sx+z.w/2, sy+z.h/2+8);
      ctx.globalAlpha = 1;
      ctx.textAlign = "start";
    }
    // border
    ctx.strokeStyle = st.border;
    ctx.lineWidth = 2;
    ctx.strokeRect(sx+1, sy+1, z.w-2, z.h-2);
    // label in corner
    ctx.font = "bold 11px Arial";
    ctx.fillStyle = st.labelCol;
    ctx.textAlign = "left";
    ctx.fillText(st.label, sx+6, sy+15);
  }
}

function drawWorldBg(w, h, tile){
  // simple ground grid for spatial reference (extends to cover zoomed-out view)
  const z = getZoom();
  const _vw = VIEW_W() * z, _vh = VIEW_H() * z;
  ctx.fillStyle = "#1a1d22";
  ctx.fillRect(0,0,_vw,_vh);
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;
  const step = 60;
  const offX = -((cam.x) % step);
  const offY = -((cam.y) % step);
  for (let x = offX; x < _vw; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, _vh); ctx.stroke();
  }
  for (let y = offY; y < _vh; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(_vw, y); ctx.stroke();
  }
  // world border
  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.strokeRect(-cam.x, -cam.y, w, h);
}

// 🌿 BUSH (a small cluster of leafy circles)
function drawBush(b){
  const x = b.x - cam.x, y = b.y - cam.y;
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath();
  ctx.ellipse(x, y + b.r*0.6, b.r*0.9, b.r*0.35, 0, 0, Math.PI*2);
  ctx.fill();
  // dark base
  ctx.fillStyle = "#234d28";
  ctx.beginPath();
  ctx.arc(x, y, b.r, 0, Math.PI*2);
  ctx.fill();
  // leafy lobes
  ctx.fillStyle = "#2f7a3a";
  ctx.beginPath(); ctx.arc(x - b.r*0.45, y - b.r*0.15, b.r*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + b.r*0.45, y - b.r*0.10, b.r*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,             y - b.r*0.55, b.r*0.55, 0, Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle = "rgba(180,255,160,0.30)";
  ctx.beginPath();
  ctx.arc(x - b.r*0.3, y - b.r*0.45, b.r*0.18, 0, Math.PI*2);
  ctx.fill();
}

// ⚡ AIRDROP (parachute crate falling from the sky)
function drawAirdrop(a){
  const swayX = Math.sin(a.sway) * 6;
  const x = (a.x + swayX) - cam.x;
  const y = a.y - cam.y;

  // shadow on the ground showing the impending landing spot
  const fallProgress = Math.min(1, (a.y - (a.targetY - 360)) / 360); // 0 → 1
  const shadowR = 18 + fallProgress * 12;
  const shadowAlpha = 0.15 + fallProgress * 0.35;
  const sy = a.targetY - cam.y;
  ctx.fillStyle = "rgba(0,0,0," + shadowAlpha + ")";
  ctx.beginPath();
  ctx.ellipse(a.x - cam.x, sy + 6, shadowR, shadowR*0.4, 0, 0, Math.PI*2);
  ctx.fill();

  // parachute (semicircle)
  ctx.fillStyle = "#ffd24a";
  ctx.beginPath();
  ctx.arc(x, y - 26, 24, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "#a8780a";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 24, y - 26); ctx.lineTo(x - 8, y - 8);
  ctx.moveTo(x,      y - 50); ctx.lineTo(x,     y - 8);
  ctx.moveTo(x + 24, y - 26); ctx.lineTo(x + 8, y - 8);
  ctx.stroke();
  // chute panels
  ctx.beginPath();
  ctx.moveTo(x - 12, y - 47); ctx.lineTo(x - 12, y - 26);
  ctx.moveTo(x + 12, y - 47); ctx.lineTo(x + 12, y - 26);
  ctx.stroke();

  // crate body (golden glow + wood)
  ctx.fillStyle = "rgba(255,210,74,0.35)";
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#8b5a2b";
  ctx.fillRect(x - 14, y - 8, 28, 16);
  ctx.strokeStyle = "#ffd24a";
  ctx.lineWidth = 2;
  ctx.strokeRect(x - 14 + 0.5, y - 8 + 0.5, 27, 15);
  // ⚡ symbol
  ctx.fillStyle = "#fff";
  ctx.font = "bold 12px Arial";
  ctx.textAlign = "center";
  ctx.fillText("⚡", x, y + 4);
  ctx.textAlign = "start";
}

// 🏚️ BUILDING (stone walls + door gap + dim interior)
function drawBuilding(b){
  const x = b.x - cam.x, y = b.y - cam.y;
  const theme = BUILDING_THEMES[b.theme] || BUILDING_THEMES.dojo;

  // interior floor (themed)
  ctx.fillStyle = theme.floor;
  ctx.fillRect(x + 4, y + 4, b.w - 8, b.h - 8);
  // floor stripes (tatami / tile / cracked-stone effect)
  ctx.fillStyle = theme.stripe;
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(x + 8, y + 12 + i * ((b.h - 24) / 5), b.w - 16, 4);
  }

  // optional roof trim (shrine, pagoda, watchtower, teahouse)
  if (theme.roof) {
    ctx.fillStyle = theme.roof;
    ctx.fillRect(x - 5, y - 7, b.w + 10, 7);
    // small ridge cap
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(x - 5, y - 2, b.w + 10, 2);
  }

  // walls — themed color
  for (const w of b.walls) {
    const wx = w.x - cam.x, wy = w.y - cam.y;
    ctx.fillStyle = theme.wall;
    ctx.fillRect(wx, wy, w.w, w.h);
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = 1;
    ctx.strokeRect(wx + 0.5, wy + 0.5, w.w - 1, w.h - 1);
    // top highlight
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.fillRect(wx, wy, w.w, Math.max(1, w.h * 0.25));
  }

  // door frame + dark opening (orientation depends on side)
  const d = b.door;
  const dx = d.x - cam.x, dy = d.y - cam.y;
  ctx.fillStyle = theme.accent;
  if (d.side === "south" || d.side === "north") {
    ctx.fillRect(dx - 3, dy - 2, 3, d.h + 4);
    ctx.fillRect(dx + d.w, dy - 2, 3, d.h + 4);
  } else {
    ctx.fillRect(dx - 2, dy - 3, d.w + 4, 3);
    ctx.fillRect(dx - 2, dy + d.h, d.w + 4, 3);
  }
  // dark doorway opening
  ctx.fillStyle = "#1a120a";
  ctx.fillRect(dx, dy, d.w, d.h);

  // building name floating just above the structure
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.font = "bold 9px Arial";
  ctx.textAlign = "center";
  ctx.fillText(theme.label, x + b.w/2, y - (theme.roof ? 12 : 4));
  ctx.textAlign = "start";
}

function drawLobby(){
  drawWorldBg(lobby.width, lobby.height);

  // dojo floor pad
  ctx.fillStyle = "#2a221c";
  ctx.fillRect(60 - cam.x, 60 - cam.y, lobby.width-120, lobby.height-120);

  // 🌿 lobby bushes
  bushes.forEach(b=>drawBush(b));

  // training dummies (decoration)
  drawNinja(140, 200, 26, "#555",  Math.PI/2, { belt:"#888" });
  drawNinja(lobby.width-160, 200, 26, "#555", Math.PI/2, { belt:"#888" });

  // 🏪 ARMOR SHOP (small shrine-style hut)
  drawShopBuilding();

  // portal
  const px = portal.x - cam.x, py = portal.y - cam.y;
  const cx = px + portal.size/2, cy = py + portal.size/2;
  const t = performance.now()/300;
  // outer glow
  for (let i=4; i>=0; i--){
    ctx.fillStyle = "rgba(255,210,74," + (0.08 + 0.04*i) + ")";
    ctx.beginPath();
    ctx.arc(cx, cy, portal.size/2 + 8 + Math.sin(t)*2 + i*4, 0, Math.PI*2);
    ctx.fill();
  }
  // portal core
  ctx.fillStyle = "#ffd24a";
  ctx.beginPath();
  ctx.arc(cx, cy, portal.size/2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#1a1d22";
  ctx.beginPath();
  ctx.arc(cx, cy, portal.size/2 - 6, 0, Math.PI*2);
  ctx.fill();

  // sign
  ctx.fillStyle = "#ffd24a";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.fillText("ENTER THE DOJO", cx, py - 14);
  ctx.fillStyle = "#aaa";
  ctx.font = "12px Arial";
  ctx.fillText("step into the portal to begin", cx, py - 0);

  // welcome scroll
  ctx.fillStyle = "#fff";
  ctx.font = "bold 22px Arial";
  ctx.fillText("Lobby — Shadow Clan HQ", 300, 32);
  ctx.fillStyle = "#bbb";
  ctx.font = "13px Arial";
  ctx.fillText("Best Level " + bests.bestLevel + "  •  High Score " + bests.bestScore, 300, 52);

  // player ninja (with equipped armor visualized)
  const ar = currentArmor();
  drawNinja(player.x, player.y, player.size, "#3a6dd9", player.aim,
            { belt:"#1f3d80", armorColor: ar.color, armorTrim: ar.trim });

  // "[E] Shop" prompt when standing close to the shop
  if (nearShop() && !shopOpen) {
    const sx = shop.x + shop.w/2 - cam.x;
    const sy = shop.y - cam.y - 6;
    ctx.fillStyle = "rgba(0,0,0,0.65)";
    ctx.fillRect(sx - 44, sy - 20, 88, 18);
    ctx.fillStyle = "#ffd24a";
    ctx.font = "bold 11px Arial";
    ctx.textAlign = "center";
    ctx.fillText("[E] Equipment Shop", sx, sy - 6);
  }

  ctx.textAlign = "start";
}

function drawShopBuilding(){
  const sx = shop.x - cam.x, sy = shop.y - cam.y;
  // base hut walls (red shrine palette)
  ctx.fillStyle = "#3a1d1d";
  ctx.fillRect(sx + 4, sy + 4, shop.w - 8, shop.h - 8);
  ctx.fillStyle = "#a23b3b";
  // four wall segments with door gap on south
  const t = 8, doorW = 30;
  const dx = sx + shop.w/2 - doorW/2;
  ctx.fillRect(sx, sy, shop.w, t);                                   // top
  ctx.fillRect(sx, sy + shop.h - t, dx - sx, t);                     // bottom-left
  ctx.fillRect(dx + doorW, sy + shop.h - t, sx + shop.w - (dx + doorW), t); // bottom-right
  ctx.fillRect(sx, sy, t, shop.h);                                   // left
  ctx.fillRect(sx + shop.w - t, sy, t, shop.h);                      // right
  // roof / cream trim
  ctx.fillStyle = "#f0e6d2";
  ctx.fillRect(sx - 6, sy - 8, shop.w + 12, 8);
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(sx - 6, sy - 2, shop.w + 12, 2);
  // door opening
  ctx.fillStyle = "#1a120a";
  ctx.fillRect(dx, sy + shop.h - t, doorW, t);
  // hanging shop sign
  ctx.fillStyle = "#ffd24a";
  ctx.font = "bold 12px Arial";
  ctx.textAlign = "center";
  ctx.fillText("🛡 SHOP", sx + shop.w/2, sy - 14);
  ctx.fillStyle = "#bbb";
  ctx.font = "10px Arial";
  ctx.fillText("walk up & press E", sx + shop.w/2, sy + shop.h + 14);
  ctx.textAlign = "start";
}

// Helper: draw one shop row (used by all three tabs)
function drawShopRow(r, swatchColor, swatchTrim, nameText, statText, statusText, statusColor, isEquipped, isAffordable){
  ctx.fillStyle = isEquipped ? "rgba(255,210,74,0.18)"
                : isAffordable ? "rgba(255,255,255,0.05)"
                               : "rgba(255,80,80,0.05)";
  ctx.fillRect(r.x, r.y, r.w, r.h);
  if (isEquipped){ ctx.strokeStyle="#ffd24a"; ctx.lineWidth=1; ctx.strokeRect(r.x+0.5,r.y+0.5,r.w-1,r.h-1); }
  if (swatchColor){
    ctx.fillStyle = swatchColor;
    ctx.fillRect(r.x+6, r.y+4, 16, 16);
    if (swatchTrim){ ctx.strokeStyle=swatchTrim; ctx.lineWidth=2; ctx.strokeRect(r.x+6.5,r.y+4.5,15,15); }
  } else {
    ctx.fillStyle="#444"; ctx.fillRect(r.x+6,r.y+4,16,16);
  }
  ctx.textAlign="left";  ctx.fillStyle=isAffordable?"#fff":"#777"; ctx.font="bold 12px Arial"; ctx.fillText(nameText, r.x+30, r.y+16);
  ctx.textAlign="right"; ctx.fillStyle=isAffordable?"#7ad3ff":"#666"; ctx.font="12px Arial"; ctx.fillText(statText, r.x+r.w-110, r.y+16);
  ctx.fillStyle=statusColor; ctx.font="bold 11px Arial"; ctx.fillText(statusText, r.x+r.w-6, r.y+16);
}

// 🛍️ Tabbed equipment shop overlay
function drawShopOverlay(){
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const p = shopPanelRect();
  ctx.fillStyle = "#1a1d22";
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.strokeStyle = "#ffd24a"; ctx.lineWidth = 2;
  ctx.strokeRect(p.x+0.5, p.y+0.5, p.w-1, p.h-1);

  // title + coin balance
  ctx.fillStyle = "#ffd24a"; ctx.font = "bold 18px Arial"; ctx.textAlign = "left";
  ctx.fillText("🛡 EQUIPMENT SHOP", p.x+16, p.y+28);
  ctx.fillStyle = "#ffd24a"; ctx.font = "bold 14px Arial"; ctx.textAlign = "right";
  ctx.fillText("🪙 " + bests.coins.toLocaleString() + " coins", p.x+p.w-16, p.y+28);
  ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
  ctx.fillText("✕", p.x+p.w-18, p.y+22);

  // tabs
  const tabs = ["armor","helmet","boots"];
  const tabLabels = ["🛡 ARMOR","🪖 HELMET","👟 BOOTS"];
  for (let ti=0; ti<tabs.length; ti++){
    const tr = shopTabRect(ti);
    const active = shopTab === tabs[ti];
    ctx.fillStyle = active ? "#ffd24a" : "#2a2d35";
    ctx.fillRect(tr.x, tr.y, tr.w, tr.h);
    ctx.strokeStyle = active ? "#ffd24a" : "#555"; ctx.lineWidth=1;
    ctx.strokeRect(tr.x+0.5, tr.y+0.5, tr.w-1, tr.h-1);
    ctx.fillStyle = active ? "#000" : "#aaa"; ctx.font="bold 12px Arial"; ctx.textAlign="center";
    ctx.fillText(tabLabels[ti], tr.x+tr.w/2, tr.y+17);
  }

  // sub-header
  ctx.font = "11px Arial"; ctx.fillStyle = "#aaa"; ctx.textAlign = "left";
  if (shopTab==="armor")  ctx.fillText("Level-locked suits. Best Level: "+bests.bestLevel, p.x+16, p.y+88);
  if (shopTab==="helmet") ctx.fillText("Buy once with coins. Reduces incoming damage.", p.x+16, p.y+88);
  if (shopTab==="boots")  ctx.fillText("Buy once with coins. Increases movement speed.", p.x+16, p.y+88);

  // rows
  if (shopTab === "armor"){
    for (let i=0; i<ARMOR_SETS.length; i++){
      const s = ARMOR_SETS[i];
      const unlocked = bests.bestLevel >= s.unlock;
      const equipped  = bests.armorTier === i;
      const stat  = Math.round(s.dr*100)+"% DR";
      const status = equipped ? "EQUIPPED" : unlocked ? "click to equip" : "Lv "+s.unlock;
      const col   = equipped ? "#ffd24a" : unlocked ? "#9ae27a" : "#ff8888";
      drawShopRow(shopRowRect(i), s.color, s.trim, "T"+s.tier+" — "+s.name, stat, status, col, equipped, unlocked);
    }
  } else if (shopTab === "helmet"){
    for (let i=0; i<HELMET_SHOP.length; i++){
      const h = HELMET_SHOP[i];
      const owned   = bests.helmetTier >= i;
      const equipped = bests.helmetTier === i;
      const canBuy  = i===0 || (bests.coins >= h.price && !owned);
      const stat  = Math.round(h.dr*100)+"% DR";
      let status, col;
      if (equipped)         { status="EQUIPPED";       col="#ffd24a"; }
      else if (owned)        { status="click to equip"; col="#9ae27a"; }
      else if (bests.coins>=h.price){ status="Buy 🪙 "+h.price.toLocaleString(); col="#88ffaa"; }
      else                   { status="Need 🪙 "+h.price.toLocaleString(); col="#ff8888"; }
      drawShopRow(shopRowRect(i), h.color, h.trim, h.name, stat, status, col, equipped, owned||(bests.coins>=h.price));
    }
  } else if (shopTab === "boots"){
    for (let i=0; i<BOOTS_SHOP.length; i++){
      const b = BOOTS_SHOP[i];
      const owned   = bests.bootsTier >= i;
      const equipped = bests.bootsTier === i;
      const stat  = "+"+Math.round(b.bonus*100/1.2)+"%spd";
      let status, col;
      if (equipped)         { status="EQUIPPED";       col="#ffd24a"; }
      else if (owned)        { status="click to equip"; col="#9ae27a"; }
